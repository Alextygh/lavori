<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Means of Transport — Wikidata Explorer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161922; --border: #252a36;
      --accent: #5cffa0; --accent2: #3ad4ff; --muted: #5a6070;
      --text: #e2e6f0; --label: #8b9ab0; --danger: #ff6b6b; --radius: 6px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', system-ui, sans-serif; min-height: 100vh; }
    header { padding: 3rem 2rem 2rem; max-width: 960px; margin: 0 auto; }
    .eyebrow { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 800; line-height: 1.05; color: var(--text); }
    h1 span { color: var(--accent); }
    .subtitle { margin-top: 0.75rem; font-size: 0.95rem; color: var(--label); font-weight: 400; max-width: 540px; line-height: 1.6; }
    .rule { max-width: 960px; margin: 0 auto 1.5rem; padding: 0 2rem; }
    .rule hr { border: none; border-top: 1px solid var(--border); }
    .controls { max-width: 960px; margin: 0 auto 1.5rem; padding: 0 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    input[type="search"] { width: 100%; padding: 0.65rem 0.9rem 0.65rem 2.3rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--muted); }
    .count-badge { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .count-badge strong { color: var(--accent2); }
    #status { max-width: 960px; margin: 0 auto 1.5rem; padding: 0 2rem; }
    .status-msg { display: flex; align-items: center; gap: 0.6rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--label); }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: var(--danger); font-family: 'DM Mono', monospace; font-size: 0.78rem; }
    .error-msg a { color: var(--accent2); }
    .grid-wrap { max-width: 960px; margin: 0 auto; padding: 0 2rem 4rem; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.6rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1rem; text-decoration: none; display: flex; flex-direction: column; gap: 0.25rem; transition: border-color 0.15s, transform 0.15s; }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-label { font-size: 0.92rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-id { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }
    .card-desc { font-size: 0.75rem; color: var(--label); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #load-more-wrap { text-align: center; margin-top: 1.5rem; }
    #load-more { padding: 0.7rem 2rem; background: transparent; border: 1px solid var(--accent); border-radius: var(--radius); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 0.8rem; cursor: pointer; transition: background 0.2s, color 0.2s; letter-spacing: 0.05em; }
    #load-more:hover { background: var(--accent); color: var(--bg); }
    #load-more:disabled { opacity: 0.4; cursor: default; }
    #empty { text-align: center; padding: 4rem 2rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.85rem; display: none; }
    @media (max-width: 500px) {
      header { padding: 2rem 1.25rem 1.5rem; }
      .controls, #status, .grid-wrap, .rule { padding-left: 1.25rem; padding-right: 1.25rem; }
      #grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Wikidata · Q106839123</p>
  <h1>Means of <span>Transport</span></h1>
  <p class="subtitle">Every item that is an instance or subclass of <em>means of transport</em>, fetched live from Wikidata.</p>
</header>

<div class="rule"><hr></div>

<div id="status">
  <div class="status-msg" id="status-msg">
    <div class="spinner"></div>
    Querying Wikidata SPARQL…
  </div>
</div>

<div class="controls" id="controls" style="display:none">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="search" placeholder="Filter entries…" autocomplete="off" />
  </div>
  <span class="count-badge" id="count-badge"></span>
</div>

<div class="grid-wrap">
  <div id="grid"></div>
  <div id="empty">No entries match your filter.</div>
  <div id="load-more-wrap" style="display:none">
    <button id="load-more">Load more</button>
  </div>
</div>

<script>
  const PAGE_SIZE = 50;
  let allItems = [];
  let filtered = [];
  let shown = 0;

  const QUERY = `SELECT DISTINCT ?item ?itemLabel ?itemDescription WHERE {
  { ?item wdt:P279* wd:Q106839123 . }
  UNION
  { ?sub wdt:P279* wd:Q106839123 . ?item wdt:P31 ?sub . }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "en,it". }
} ORDER BY ?itemLabel LIMIT 5000`;

  // Try multiple CORS proxies in sequence
  const PROXIES = [
    q => `https://corsproxy.io/?${encodeURIComponent('https://query.wikidata.org/sparql?query=' + encodeURIComponent(q) + '&format=json')}`,
    q => `https://api.allorigins.win/get?url=${encodeURIComponent('https://query.wikidata.org/sparql?query=' + encodeURIComponent(q) + '&format=json')}`,
  ];

  async function fetchViaProxy(proxyFn, query) {
    const url = proxyFn(query);
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const outer = await res.json();
    // allorigins wraps in { contents: "..." }
    const raw = outer.contents !== undefined ? JSON.parse(outer.contents) : outer;
    return raw.results.bindings.map(b => ({
      qid:   b.item.value.replace('http://www.wikidata.org/entity/', ''),
      label: b.itemLabel?.value || '(no label)',
      desc:  b.itemDescription?.value || '',
      url:   b.item.value,
    }));
  }

  async function fetchData() {
    for (const proxy of PROXIES) {
      try {
        return await fetchViaProxy(proxy, QUERY);
      } catch(e) {
        console.warn('Proxy failed:', e);
      }
    }
    throw new Error('All proxies failed. Try opening the page from a web server instead of file://');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderCards(items) {
    const frag = document.createDocumentFragment();
    items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="card-label" title="${escHtml(item.label)}">${escHtml(item.label)}</div>
        <div class="card-id">${escHtml(item.qid)}</div>
        ${item.desc ? `<div class="card-desc">${escHtml(item.desc)}</div>` : ''}
      `;
      frag.appendChild(a);
    });
    document.getElementById('grid').appendChild(frag);
  }

  function updateBadge() {
    const badge = document.getElementById('count-badge');
    const filterActive = document.getElementById('search').value.trim() !== '';
    if (filterActive) {
      badge.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> of <strong>${allItems.length.toLocaleString()}</strong> entries`;
    } else {
      badge.innerHTML = `<strong>${allItems.length.toLocaleString()}</strong> entries`;
    }
  }

  function showMore() {
    const batch = filtered.slice(shown, shown + PAGE_SIZE);
    renderCards(batch);
    shown += batch.length;
    const wrap = document.getElementById('load-more-wrap');
    const btn = document.getElementById('load-more');
    if (shown >= filtered.length) {
      wrap.style.display = 'none';
    } else {
      wrap.style.display = 'block';
      btn.textContent = `Load more (${filtered.length - shown} remaining)`;
    }
  }

  function applyFilter() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    filtered = q
      ? allItems.filter(it =>
          it.label.toLowerCase().includes(q) ||
          it.desc.toLowerCase().includes(q) ||
          it.qid.toLowerCase().includes(q)
        )
      : allItems;

    document.getElementById('grid').innerHTML = '';
    shown = 0;
    updateBadge();

    const empty = document.getElementById('empty');
    if (!filtered.length) {
      empty.style.display = 'block';
      document.getElementById('load-more-wrap').style.display = 'none';
    } else {
      empty.style.display = 'none';
      showMore();
    }
  }

  (async () => {
    try {
      allItems = await fetchData();

      document.getElementById('status').style.display = 'none';
      document.getElementById('controls').style.display = 'flex';

      filtered = allItems;
      updateBadge();
      showMore();

      document.getElementById('search').addEventListener('input', applyFilter);
      document.getElementById('load-more').addEventListener('click', showMore);

    } catch (err) {
      document.getElementById('status-msg').outerHTML =
        `<div class="error-msg">⚠ ${escHtml(err.message)}<br><br>
        You can also <a href="https://query.wikidata.org/#${encodeURIComponent(QUERY)}" target="_blank">run the query directly on Wikidata</a>.</div>`;
    }
  })();
</script>
</body>
</html>
