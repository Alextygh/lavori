<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Wild — Arrive</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-title">Infinite Wild</div>
  <a href="index.html" class="active">Arrive</a>
  <a href="explore.html">Explore</a>
</nav>

<main class="page">
  <div class="arrive-layout">

    <!-- MAP COLUMN -->
    <div>
      <div class="map-container" id="map-wrap" style="height: 360px;">
        <canvas id="map-canvas" height="360"></canvas>
        <div class="map-overlay" id="map-overlay"></div>
        <div class="map-coords-display" id="map-hover"></div>
        <div class="map-zoom-controls">
          <button class="zoom-btn" id="btn-zoom-in">+</button>
          <button class="zoom-btn" id="btn-zoom-out">−</button>
          <button class="zoom-btn" id="btn-zoom-reset" style="font-size:9px;">⌂</button>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <!-- INFO COLUMN -->
    <div class="info-panel">

      <div>
        <div class="section-label">Your coordinates</div>
        <div class="coord-display" id="coord-display">—</div>
        <div class="coord-sub" id="coord-sub">Press arrive to teleport</div>
      </div>

      <hr class="divider" />

      <div id="biome-weather-wrap" style="display:none;">
        <div class="section-label">Biome &amp; weather</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="biome-badge" id="biome-badge"></div>
          <div class="weather-row" id="weather-display"></div>
        </div>
      </div>

      <div>
        <div class="section-label">Arrival report</div>
        <div class="desc-box" id="desc-box">
          <span class="desc-loading">Awaiting coordinates...</span>
        </div>
      </div>

      <button class="btn-primary" id="arrive-btn">&#x21E5; Arrive somewhere</button>
      <button class="btn-secondary" id="copy-btn" style="display:none;">Copy coordinates</button>

    </div>
  </div>
</main>

<script type="module" src="js/arrive.js"></script>
</body>
</html>
