<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Wild — Explore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c0f;
  --surface: #13171e;
  --surface2: #1c2230;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent: #4ade80;
  --accent2: #22c55e;
  --danger: #f87171;
  --gold: #fbbf24;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

.nav {
  display: flex;
  align-items: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 1.25rem;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.85rem 1rem 0.85rem 0;
  margin-right: 1rem;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}

.nav a {
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 0.85rem 1rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-decoration: none;
  display: inline-block;
}

.nav a:hover { color: var(--text); }
.nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

.page { padding: 1.5rem; }

.map-container {
  position: relative;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  background: #050709;
  cursor: crosshair;
  user-select: none;
  touch-action: none;
}

.map-container canvas {
  display: block;
  width: 100%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.map-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}

.search-marker {
  position: absolute;
  width: 10px;
  height: 10px;
  background: var(--gold);
  border: 2px solid #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px var(--gold);
  z-index: 10;
}

.other-marker {
  position: absolute;
  width: 7px;
  height: 7px;
  background: var(--gold);
  border: 1.5px solid rgba(255,255,255,0.6);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 9;
  opacity: 0.85;
}

.map-coords-display {
  position: absolute;
  bottom: 6px;
  left: 6px;
  font-size: 9px;
  color: rgba(255,255,255,0.45);
  background: rgba(0,0,0,0.55);
  padding: 2px 6px;
  border-radius: 2px;
  font-family: 'Space Mono', monospace;
  pointer-events: none;
}

.map-zoom-controls {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.zoom-btn {
  width: 26px;
  height: 26px;
  background: rgba(0,0,0,0.72);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  font-family: 'Space Mono', monospace;
  line-height: 1;
  transition: background 0.1s;
}

.zoom-btn:hover { background: rgba(255,255,255,0.1); }

.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 6px;
}

.biome-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1px solid;
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
}

.search-page { max-width: 700px; }

.search-header {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  margin-bottom: 0.4rem;
}

.search-sub {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 1.5rem;
  line-height: 1.65;
}

.coord-input-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 8px;
  margin-bottom: 1rem;
  align-items: end;
}

.coord-field { display: flex; flex-direction: column; gap: 5px; }

.coord-field label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.coord-field input {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 0.5rem 0.75rem;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}

.coord-field input:focus { border-color: var(--accent); }

.search-btn {
  padding: 0.5rem 1.25rem;
  background: var(--accent);
  color: #0a0c0f;
  border: none;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  height: 38px;
}

.search-btn:hover { background: var(--accent2); }

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}

.result-coords {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 4px;
}

.error-box {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  font-size: 12px;
  color: var(--danger);
  margin-bottom: 1rem;
}

.visited-list { display: flex; flex-direction: column; gap: 8px; }

.visited-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}

.visited-item:hover { border-color: var(--border2); background: var(--surface2); }

.visited-coords {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
}

.visited-info { font-size: 11px; color: var(--muted); margin-top: 2px; }

.visited-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

@media (max-width: 720px) {
  .coord-input-row { grid-template-columns: 1fr 1fr; }
  .search-btn { grid-column: 1 / -1; width: 100%; }
}
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-title">Infinite Wild</div>
  <a href="index.html">Arrive</a>
  <a href="explore.html" class="active">Explore</a>
</nav>

<main class="page">
  <div class="search-page">

    <div class="search-header">Explore coordinates</div>
    <p class="search-sub">Enter any coordinates — including ones shared by others — to see what exists there. The world is deterministic: the same coordinates always yield the same biome and weather.</p>

    <div class="coord-input-row">
      <div class="coord-field">
        <label for="search-x">X coordinate</label>
        <input type="number" id="search-x" placeholder="e.g. 14823" />
      </div>
      <div class="coord-field">
        <label for="search-z">Z coordinate</label>
        <input type="number" id="search-z" placeholder="e.g. -7291" />
      </div>
      <button class="search-btn" id="search-btn">Search</button>
    </div>

    <div id="search-result"></div>

    <hr class="divider" style="margin-bottom:1rem;" />

    <div class="section-label" style="margin-bottom:0.5rem;">Registry map</div>
    <div class="map-container" style="height:320px;margin-bottom:1rem;">
      <canvas id="map-canvas-explore" width="800" height="320"></canvas>
      <div class="map-overlay" id="map-overlay-explore"></div>
      <div class="map-coords-display" id="map-hover-explore"></div>
      <div class="map-zoom-controls">
        <button class="zoom-btn" id="btn-zoom-in-ex">+</button>
        <button class="zoom-btn" id="btn-zoom-out-ex">−</button>
        <button class="zoom-btn" id="btn-zoom-reset-ex" style="font-size:9px;">⌂</button>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:0.6rem;">Visited locations</div>
    <div class="visited-list" id="visited-list">
      <div style="color:var(--muted);font-size:12px;">No locations yet. Arrive somewhere first.</div>
    </div>

  </div>
</main>

<script>
// ─── WORLD ────────────────────────────────────────────────────────────────────

const BIOMES = [
  { id:'void',         name:'Void',          color:'#050709',  textColor:'#4a5568', border:'#1a202c' },
  { id:'deep-ocean',   name:'Deep Ocean',    color:'#0a1628',  textColor:'#63b3ed', border:'#2b6cb0' },
  { id:'ocean',        name:'Ocean',         color:'#0e2040',  textColor:'#63b3ed', border:'#2b6cb0' },
  { id:'shore',        name:'Shoreline',     color:'#1a3a5c',  textColor:'#90cdf4', border:'#3182ce' },
  { id:'tundra',       name:'Tundra',        color:'#8aa8c8',  textColor:'#e2e8f0', border:'#a0aec0' },
  { id:'snow',         name:'Snowfield',     color:'#d0e8f0',  textColor:'#2d3748', border:'#90cdf4' },
  { id:'plains',       name:'Plains',        color:'#4a7a2a',  textColor:'#c6f6d5', border:'#276749' },
  { id:'forest',       name:'Forest',        color:'#2a5018',  textColor:'#9ae6b4', border:'#276749' },
  { id:'dense-forest', name:'Dense Forest',  color:'#183210',  textColor:'#68d391', border:'#2f855a' },
  { id:'jungle',       name:'Jungle',        color:'#154a14',  textColor:'#68d391', border:'#276749' },
  { id:'swamp',        name:'Swamp',         color:'#243a18',  textColor:'#d69e2e', border:'#744210' },
  { id:'desert',       name:'Desert',        color:'#b89040',  textColor:'#744210', border:'#c05621' },
  { id:'badlands',     name:'Badlands',      color:'#7a3818',  textColor:'#fbd38d', border:'#c05621' },
  { id:'mountain',     name:'Mountains',     color:'#5a6070',  textColor:'#e2e8f0', border:'#718096' },
  { id:'peak',         name:'Peak',          color:'#909aaa',  textColor:'#1a202c', border:'#a0aec0' },
  { id:'volcanic',     name:'Volcanic',      color:'#330c0c',  textColor:'#fc8181', border:'#c53030' },
  { id:'lava',         name:'Lava Fields',   color:'#7a1c08',  textColor:'#feb2b2', border:'#e53e3e' },
  { id:'crystal',      name:'Crystal Basin', color:'#3a2058',  textColor:'#d6bcfa', border:'#805ad5' },
  { id:'anomaly',      name:'Anomaly Zone',  color:'#200830',  textColor:'#e9d8fd', border:'#6b46c1' },
];

const BIOME_MAP = Object.fromEntries(BIOMES.map(b => [b.id, b]));

const WEATHERS = [
  { id:'clear',    name:'Clear',        icon:'☀' },
  { id:'cloudy',   name:'Overcast',     icon:'◻' },
  { id:'foggy',    name:'Heavy Fog',    icon:'≈' },
  { id:'rain',     name:'Rainfall',     icon:'|' },
  { id:'storm',    name:'Thunderstorm', icon:'⚡' },
  { id:'snow',     name:'Snowfall',     icon:'*' },
  { id:'blizzard', name:'Blizzard',     icon:'#' },
  { id:'ash',      name:'Ash Rain',     icon:'~' },
  { id:'aurora',   name:'Aurora',       icon:'◈' },
  { id:'static',   name:'Static Pulse', icon:'§' },
];

const WEATHER_MAP = Object.fromEntries(WEATHERS.map(w => [w.id, w]));

const BIOME_WEATHER = {
  'void':         ['foggy','static'],
  'deep-ocean':   ['rain','storm','cloudy'],
  'ocean':        ['clear','cloudy','rain','storm'],
  'shore':        ['clear','cloudy','rain'],
  'tundra':       ['snow','blizzard','cloudy','foggy'],
  'snow':         ['snow','blizzard','clear'],
  'plains':       ['clear','cloudy','rain','storm'],
  'forest':       ['clear','cloudy','rain','foggy'],
  'dense-forest': ['foggy','rain','cloudy'],
  'jungle':       ['rain','storm','foggy','cloudy'],
  'swamp':        ['foggy','rain','cloudy'],
  'desert':       ['clear','cloudy','ash'],
  'badlands':     ['cloudy','ash','storm'],
  'mountain':     ['clear','cloudy','snow','storm'],
  'peak':         ['snow','blizzard','clear'],
  'volcanic':     ['ash','cloudy','storm'],
  'lava':         ['ash','static'],
  'crystal':      ['aurora','static','clear'],
  'anomaly':      ['static','aurora','foggy'],
};

function hash53(x, z, seed) {
  let lo = (Math.imul(x | 0, 1619) + Math.imul(z | 0, 31337) + Math.imul(seed | 0, 1013904223)) | 0;
  lo = Math.imul(lo ^ (lo >>> 16), 0x45d9f3b) | 0;
  lo = Math.imul(lo ^ (lo >>> 16), 0x45d9f3b) | 0;
  lo = (lo ^ (lo >>> 16)) >>> 0;
  const xHi = Math.floor(x / 0x100000000) | 0;
  const zHi = Math.floor(z / 0x100000000) | 0;
  let hi = (Math.imul(xHi ^ 0xdeadbeef, 0x9e3779b9) + Math.imul(zHi ^ 0xbebafeca, 0x6c62272f) + Math.imul(seed | 0, 0x517cc1b7)) | 0;
  hi = Math.imul(hi ^ (hi >>> 13), 0x5bd1e995) | 0;
  hi = (hi ^ (hi >>> 15)) >>> 0;
  return ((lo >>> 0) * 0.5 + (hi >>> 0) * 0.5) / 4294967296;
}

function smoothNoise(x, z, seed) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = x - ix, fz = z - iz;
  const ux = fx * fx * (3 - 2 * fx);
  const uz = fz * fz * (3 - 2 * fz);
  return hash53(ix,   iz,   seed)*(1-ux)*(1-uz)
       + hash53(ix+1, iz,   seed)*ux*(1-uz)
       + hash53(ix,   iz+1, seed)*(1-ux)*uz
       + hash53(ix+1, iz+1, seed)*ux*uz;
}

function hash2(x, z) {
  const xHi = Math.floor(x / 0x100000000) | 0;
  const zHi = Math.floor(z / 0x100000000) | 0;
  let h = (Math.imul((x | 0), 1619) + Math.imul((z | 0), 31337) + 1013904223) | 0;
  h ^= Math.imul(xHi ^ 0xdeadbeef, 0x9e3779b9) | 0;
  h ^= Math.imul(zHi ^ 0xbebafeca, 0x6c62272f) | 0;
  h = Math.imul(h ^ (h >>> 16), 0x45d9f3b) | 0;
  h = Math.imul(h ^ (h >>> 16), 0x45d9f3b) | 0;
  return (h ^ (h >>> 16)) >>> 0;
}

function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function getBiomeAt(wx, wz) {
  const S = 1 / 280;
  const elev = smoothNoise(wx*S, wz*S, 42)*0.5
             + smoothNoise(wx*S*2.1, wz*S*2.1, 137)*0.3
             + smoothNoise(wx*S*0.4, wz*S*0.4, 271)*0.2;
  const temp  = smoothNoise(wx*S*0.7, wz*S*0.7+1000, 43);
  const moist = smoothNoise(wx*S*0.9+500, wz*S*0.9, 138);
  const anom  = smoothNoise(wx*S*3, wz*S*3, 370);
  if (anom > 0.78) return 'anomaly';
  if (anom > 0.72) return 'crystal';
  if (elev < 0.15) return 'void';
  if (elev < 0.25) return 'deep-ocean';
  if (elev < 0.35) return 'ocean';
  if (elev < 0.40) return 'shore';
  if (elev > 0.80) return 'peak';
  if (elev > 0.70) return 'mountain';
  if (elev > 0.75 && temp < 0.3) return 'snow';
  if (temp > 0.78) {
    if (elev > 0.60) return 'volcanic';
    if (elev > 0.55) return 'lava';
    return moist > 0.5 ? 'badlands' : 'desert';
  }
  if (temp < 0.22) return moist > 0.5 ? 'tundra' : 'snow';
  if (moist > 0.75) return elev > 0.6 ? 'jungle' : 'swamp';
  if (moist > 0.60) return elev > 0.55 ? 'dense-forest' : 'forest';
  if (moist > 0.40) return 'forest';
  if (moist > 0.25) return 'plains';
  return 'desert';
}

function getWeatherAt(wx, wz, biomeId) {
  const opts = BIOME_WEATHER[biomeId] || ['clear', 'cloudy'];
  const r = mulberry32(hash2(wx, wz));
  return opts[Math.floor(r() * opts.length)];
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000)    return 'just now';
  if (d < 3600000)  return Math.floor(d / 60000) + 'm ago';
  if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
  return Math.floor(d / 86400000) + 'd ago';
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────

const PREFIX = 'iw:loc:';

function loadAllLocations() {
  const locs = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith(PREFIX)) continue;
      try { locs.push(JSON.parse(localStorage.getItem(key))); } catch {}
    }
    locs.sort((a, b) => b.ts - a.ts);
  } catch (e) {
    console.warn('Storage load failed:', e);
  }
  return locs;
}

// ─── MAP ─────────────────────────────────────────────────────────────────────

const state = { cx: 0, cz: 0, zoom: 8, dragging: false, lastMX: 0, lastMY: 0 };

const tileCache = new Map();
function getBiomeColor(wx, wz) {
  const ix = Math.round(wx), iz = Math.round(wz);
  const key = ix + ',' + iz;
  if (tileCache.has(key)) return tileCache.get(key);
  const color = (BIOME_MAP[getBiomeAt(ix, iz)] || BIOMES[0]).color;
  if (tileCache.size > 20000) tileCache.clear();
  tileCache.set(key, color);
  return color;
}

function fitCanvas(canvas) {
  const p = canvas.parentElement;
  const rect = p.getBoundingClientRect();
  const w = Math.round(rect.width)  || p.offsetWidth  || 800;
  const h = Math.round(rect.height) || p.offsetHeight || 320;
  if (canvas.width  !== w) canvas.width  = w;
  if (canvas.height !== h) canvas.height = h;
}

function worldToPixel(wx, wz, W, H) {
  return {
    x: W / 2 + (wx - state.cx) * state.zoom,
    y: H / 2 + (wz - state.cz) * state.zoom,
  };
}

function screenToWorld(sx, sz, W, H) {
  return {
    x: state.cx + (sx - W / 2) / state.zoom,
    z: state.cz + (sz - H / 2) / state.zoom,
  };
}

function drawMap(canvas, visitedLocations, playerPos, searchPos) {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#050709';
  ctx.fillRect(0, 0, W, H);

  const worldPerPixel = Math.max(4, 1 / state.zoom);
  const pixelPerWorld = Math.max(1, state.zoom);
  const step = worldPerPixel;
  const cellPx = Math.max(1, Math.ceil(pixelPerWorld * step));
  const worldLeft = state.cx - (W / 2) / state.zoom;
  const worldTop  = state.cz - (H / 2) / state.zoom;
  const startWX = Math.floor(worldLeft / step) * step;
  const startWZ = Math.floor(worldTop  / step) * step;

  for (let wz = startWZ; ; wz += step) {
    const py2 = Math.round(H / 2 + (wz - state.cz) * state.zoom);
    if (py2 > H + cellPx) break;
    for (let wx = startWX; ; wx += step) {
      const px = Math.round(W / 2 + (wx - state.cx) * state.zoom);
      if (px > W + cellPx) break;
      ctx.fillStyle = getBiomeColor(wx, wz);
      ctx.fillRect(px, py2, cellPx + 1, cellPx + 1);
    }
  }

  visitedLocations.forEach(loc => {
    const p = worldToPixel(loc.x, loc.z, W, H);
    const size = 10;
    const biome = BIOME_MAP[loc.biomeId] || BIOMES[0];
    ctx.fillStyle = biome.color;
    ctx.strokeStyle = biome.textColor;
    ctx.lineWidth = 1;
    ctx.fillRect(p.x - size / 2, p.y - size / 2, size, size);
    ctx.strokeRect(p.x - size / 2, p.y - size / 2, size, size);
  });

  if (visitedLocations.length === 0 && !searchPos) {
    ctx.fillStyle = 'rgba(107,114,128,0.7)';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('No visited locations yet', W / 2, H / 2);
    ctx.textAlign = 'left';
  }
}

function fitToLocations(locations, W, H) {
  if (!locations.length) return;
  state.cx = locations[0].x;
  state.cz = locations[0].z;
  if (locations.length === 1) {
    state.zoom = 4;
    return;
  }
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  locations.forEach(l => {
    if (l.x < minX) minX = l.x;
    if (l.x > maxX) maxX = l.x;
    if (l.z < minZ) minZ = l.z;
    if (l.z > maxZ) maxZ = l.z;
  });
  state.cx = (minX + maxX) / 2;
  state.cz = (minZ + maxZ) / 2;
  // Clamp zoom: must be high enough that the tile step stays reasonable
  // step = max(4, 1/zoom), so zoom must stay >= 0.001 to keep step <= 1000
  state.zoom = 4; // always use a fixed readable zoom for sparse overview
}

function updateOverlay(overlayEl, visitedLocations, playerPos, searchPos, W, H) {
  overlayEl.innerHTML = '';
  function addMarker(cls, wx, wz) {
    const p = worldToPixel(wx, wz, W, H);
    if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) return;
    const dot = document.createElement('div');
    dot.className = cls;
    dot.style.left = p.x + 'px';
    dot.style.top  = p.y + 'px';
    overlayEl.appendChild(dot);
  }
  visitedLocations.forEach(loc => {
    if (searchPos && loc.x === searchPos.x && loc.z === searchPos.z) return;
    addMarker('other-marker', loc.x, loc.z);
  });
  if (searchPos) addMarker('search-marker', searchPos.x, searchPos.z);
}

function centerOn(wx, wz, newZoom) {
  state.cx = wx;
  state.cz = wz;
  if (newZoom != null) state.zoom = newZoom;
}

function zoomMap(factor) {
  state.zoom = Math.max(0.0000001, Math.min(64, state.zoom * factor));
}

function resetZoom() { state.zoom = 8; }

function setupControls(canvas, hoverEl, onRedraw) {
  canvas.addEventListener('mousedown', e => {
    state.dragging = true;
    state.lastMX = e.clientX;
    state.lastMY = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const wp = screenToWorld(e.clientX - rect.left, e.clientY - rect.top, canvas.width, canvas.height);
    if (hoverEl) hoverEl.textContent = Math.round(wp.x) + ', ' + Math.round(wp.z);
    if (!state.dragging) return;
    state.cx -= (e.clientX - state.lastMX) / state.zoom;
    state.cz -= (e.clientY - state.lastMY) / state.zoom;
    state.lastMX = e.clientX;
    state.lastMY = e.clientY;
    onRedraw();
  });
  window.addEventListener('mouseup', () => {
    state.dragging = false;
    canvas.style.cursor = 'crosshair';
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    zoomMap(e.deltaY < 0 ? 1.25 : 0.8);
    onRedraw();
  }, { passive: false });

  let lastTouchDist = null;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      state.dragging = true;
      state.lastMX = e.touches[0].clientX;
      state.lastMY = e.touches[0].clientY;
    }
    if (e.touches.length === 2) {
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && state.dragging) {
      state.cx -= (e.touches[0].clientX - state.lastMX) / state.zoom;
      state.cz -= (e.touches[0].clientY - state.lastMY) / state.zoom;
      state.lastMX = e.touches[0].clientX;
      state.lastMY = e.touches[0].clientY;
      onRedraw();
    }
    if (e.touches.length === 2 && lastTouchDist) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      zoomMap(dist / lastTouchDist);
      lastTouchDist = dist;
      onRedraw();
    }
  }, { passive: false });
  canvas.addEventListener('touchend', () => { state.dragging = false; lastTouchDist = null; });
}

const BIOME_NAME_TO_ID = {
  'Void': 'void', 'Deep Ocean': 'deep-ocean', 'Ocean': 'ocean',
  'Shoreline': 'shore', 'Tundra': 'tundra', 'Snowfield': 'snow',
  'Plains': 'plains', 'Forest': 'forest', 'Dense Forest': 'dense-forest',
  'Jungle': 'jungle', 'Swamp': 'swamp', 'Desert': 'desert',
  'Badlands': 'badlands', 'Mountains': 'mountain', 'Peak': 'peak',
  'Volcanic': 'volcanic', 'Lava Fields': 'lava', 'Crystal Basin': 'crystal',
  'Anomaly Zone': 'anomaly',
};

const WEATHER_NAME_TO_ID = {
  'Clear': 'clear', 'Overcast': 'cloudy', 'Heavy Fog': 'foggy',
  'Rainfall': 'rain', 'Thunderstorm': 'storm', 'Snowfall': 'snow',
  'Blizzard': 'blizzard', 'Ash Rain': 'ash', 'Aurora': 'aurora',
  'Static Pulse': 'static',
};

const ARRIVAL_OPENERS = [
  'You arrive at {coords}.',
  'Coordinates {coords}.',
  'The Infinite Wild delivers you to {coords}.',
  'At {coords}, you materialize.',
  '{coords} —',
  'You surface at {coords}.',
];

function pick(arr, seed) { return arr[Math.abs(seed) % arr.length]; }

function hashInt(x, z) {
  let h = (Math.imul(x | 0, 1619) + Math.imul(z | 0, 31337) + 1013904223) | 0;
  h = Math.imul(h ^ (h >>> 16), 0x45d9f3b) | 0;
  h = Math.imul(h ^ (h >>> 16), 0x45d9f3b) | 0;
  return (h ^ (h >>> 16)) >>> 0;
}

function generateArrivalDescription(x, z, biomeName, weatherName) {
  const biomeKey   = BIOME_NAME_TO_ID[biomeName]   || 'plains';
  const weatherKey = WEATHER_NAME_TO_ID[weatherName] || 'clear';
  const seed = hashInt(x, z);
  const coordStr = x.toLocaleString() + ', ' + z.toLocaleString();
  const opener      = pick(ARRIVAL_OPENERS, seed).replace('{coords}', coordStr);
  const biomeLine   = pick(BIOME_PHRASES[biomeKey],    seed + 1);
  const weatherLine = pick(WEATHER_PHRASES[weatherKey], seed + 2);
  const closing     = pick(CLOSINGS,                    seed + 3);
  return Promise.resolve(`${opener} ${biomeLine} ${weatherLine}. ${closing}`);
}

function fallbackDescription(x, z, biomeName, weatherName) {
  const seed = hashInt(x, z);
  const closing = pick(CLOSINGS, seed + 3);
  return `You arrive at ${x.toLocaleString()}, ${z.toLocaleString()}. A ${biomeName.toLowerCase()} stretches in every direction under ${weatherName.toLowerCase()} skies. ${closing}`;
}

// ─── EXPLORE APP ─────────────────────────────────────────────────────────────

const canvas     = document.getElementById('map-canvas-explore');
const overlay    = document.getElementById('map-overlay-explore');
const hoverEl    = document.getElementById('map-hover-explore');
const visitedEl  = document.getElementById('visited-list');
const resultEl   = document.getElementById('search-result');
const searchXEl  = document.getElementById('search-x');
const searchZEl  = document.getElementById('search-z');
const searchBtn  = document.getElementById('search-btn');

let visitedLocations = [];
let searchedLocation = null;
let raf = null;

function redraw() {
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(() => {
    fitCanvas(canvas);
    const W = canvas.width, H = canvas.height;
    const others = visitedLocations.filter(l =>
      !searchedLocation || l.x !== searchedLocation.x || l.z !== searchedLocation.z
    );
    drawMap(canvas, others, null, searchedLocation);
    updateOverlay(overlay, others, null, searchedLocation, W, H);
  });
}

async function searchCoords() {
  const x = parseInt(searchXEl.value, 10);
  const z = parseInt(searchZEl.value, 10);

  if (isNaN(x) || isNaN(z)) {
    resultEl.innerHTML = '<div class="error-box">Enter valid X and Z coordinates.</div>';
    return;
  }

  const biomeId   = getBiomeAt(x, z);
  const weatherId = getWeatherAt(x, z, biomeId);
  const biome     = BIOME_MAP[biomeId];
  const weather   = WEATHER_MAP[weatherId];

  searchedLocation = { x, z, biomeId, weatherId };
  centerOn(x, z);
  redraw();

  resultEl.innerHTML = `
    <div class="result-card">
      <div class="result-coords">${x.toLocaleString()}, ${z.toLocaleString()}</div>
      <div style="display:flex;gap:8px;align-items:center;margin:6px 0;flex-wrap:wrap;">
        <div class="biome-badge" style="color:${biome.textColor};border-color:${biome.textColor}44;background:${biome.color}33;">
          <div style="width:8px;height:8px;background:${biome.color};border-radius:1px;border:1px solid ${biome.textColor};"></div>${biome.name}
        </div>
        <span style="font-size:12px;color:var(--muted);">${weather.icon}  ${weather.name}</span>
      </div>
      <div id="result-desc" style="font-size:12px;color:var(--muted);line-height:1.7;"></div>
    </div>
  `;

  try {
    const desc = await generateArrivalDescription(x, z, biome.name, weather.name);
    document.getElementById('result-desc').textContent = desc;
  } catch (e) {
    document.getElementById('result-desc').textContent = fallbackDescription(x, z, biome.name, weather.name);
  }
}

function renderVisited() {
  if (visitedLocations.length === 0) {
    visitedEl.innerHTML = '<div style="color:var(--muted);font-size:12px;">No locations yet. Go to Arrive and teleport somewhere.</div>';
    return;
  }
  visitedEl.innerHTML = '';
  visitedLocations.slice(0, 30).forEach(loc => {
    const biome = BIOME_MAP[loc.biomeId] || { color: '#222', textColor: '#888', name: 'Unknown' };
    const item = document.createElement('div');
    item.className = 'visited-item';
    item.innerHTML = `
      <div class="visited-dot" style="background:${biome.color};border:1.5px solid ${biome.textColor};"></div>
      <div>
        <div class="visited-coords">${loc.x.toLocaleString()}, ${loc.z.toLocaleString()}</div>
        <div class="visited-info">${biome.name}</div>
      </div>
      <div style="font-size:10px;color:var(--muted);">${timeAgo(loc.ts)}</div>
    `;
    item.addEventListener('click', () => {
      searchXEl.value = loc.x;
      searchZEl.value = loc.z;
      searchCoords();
    });
    visitedEl.appendChild(item);
  });
}

document.getElementById('btn-zoom-in-ex').addEventListener('click',  () => { zoomMap(1.5); redraw(); });
document.getElementById('btn-zoom-out-ex').addEventListener('click', () => { zoomMap(0.66); redraw(); });
document.getElementById('btn-zoom-reset-ex').addEventListener('click', () => { resetZoom(); centerOn(0, 0); redraw(); });

searchBtn.addEventListener('click', searchCoords);
searchXEl.addEventListener('keydown', e => { if (e.key === 'Enter') searchCoords(); });
searchZEl.addEventListener('keydown', e => { if (e.key === 'Enter') searchCoords(); });

visitedLocations = loadAllLocations();
renderVisited();
setupControls(canvas, hoverEl, redraw);
window.addEventListener('resize', redraw);

function initialDraw() {
  fitCanvas(canvas);
  if (canvas.width > 0 && canvas.height > 0) {
    if (visitedLocations.length > 0) {
      fitToLocations(visitedLocations, canvas.width, canvas.height);
    }
    redraw();
  }
}

if (typeof ResizeObserver !== 'undefined') {
  const ro = new ResizeObserver(() => { initialDraw(); ro.disconnect(); });
  ro.observe(canvas.parentElement);
} else {
  requestAnimationFrame(() => requestAnimationFrame(initialDraw));
}
</script>
