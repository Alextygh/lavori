<!DOCTYPE html>
<!--
  EVERY.THING
  ───────────
  39 widgets in the ALL_WIDGETS rotation (see widgetXxx functions below).
  Originally 33; widgetDinosaur, widgetMovie, widgetIDCard,
  widgetShadeMatch, widgetWordle, widgetLabyrinth, and
  widgetMinesweeper were added later (movie/dinosaur pull live data from
  Wikidata + Wikipedia; the rest are fully self-contained, including a
  recursive-backtracker maze generator and a 718-word local dictionary
  for Wordle). None of the games have a "regenerate" button — refreshing
  the whole page is the intended way to get a new puzzle, in keeping
  with the site's everything-reshuffles-on-load premise.
  5 page-wide random systems outside the widget grid:
    1. Random accent color / hue theme   (applyRandomTheme)
    2. Random font pairing                (applyRandomFontPairing)
    3. Random page <title>                (applyRandomTitle)
    4. Random tagline under the header    (TAGLINES, picked in init())
    5. Random favicon icon (Font Awesome) (buildFontAwesomeFavicon,
                                            270 solid + 52 brand icons)
  Plus 2 per-card background systems, rolled independently for every
  widget render rather than once per page:
    6. Calm decorative SVG backgrounds    (bgStars/bgGrid/bgGlow/etc.,
                                            defined but not auto-applied —
                                            available for widgets to call)
    7. Wild/chaotic backgrounds           (WILD_BACKGROUNDS, rolled via
                                            maybeWeirdBg(chance) — lava
                                            lamp, glitch bars, confetti,
                                            static, code rain, and more,
                                            ~10-18% odds per widget call)
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVERY.THING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;700&family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Source+Code+Pro:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Red+Hat+Mono:wght@400;500;700&family=Lexend:wght@400;500;600;700&family=Azeret+Mono:wght@400;500;700&family=Albert+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&family=Onest:wght@400;500;600;700&family=Martian+Mono:wght@400;600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#080c14;--surface:#0d1220;--border:rgba(100,140,220,0.15);--border-bright:rgba(100,160,255,0.3);--text:#e2e8f4;--muted:#5a6a8a;--mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:20px;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
  header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  header h1{font-family:var(--mono);font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.35em;color:#fff}
  header p{font-size:11px;letter-spacing:.2em;color:var(--muted);margin-top:6px;font-family:var(--mono);text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;max-width:1200px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px 22px 22px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px;transition:border-color .3s;min-height:190px}
  .card-bg{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .card-label,.card-main,.card-footer{position:relative;z-index:1}
  .card:hover{border-color:var(--border-bright)}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:6px 6px 0 0}
  .card.accent-blue::before{background:#3b82f6}.card.accent-teal::before{background:#14b8a6}
  .card.accent-amber::before{background:#f59e0b}.card.accent-pink::before{background:#ec4899}
  .card.accent-green::before{background:#22c55e}.card.accent-violet::before{background:#8b5cf6}
  .card.accent-red::before{background:#ef4444}.card.accent-cyan::before{background:#06b6d4}
  .card.accent-orange::before{background:#f97316}.card.accent-lime::before{background:#84cc16}
  .card-label{font-family:var(--mono);font-size:9px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .card-label .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;flex-shrink:0}
  .card-main{flex:1;display:flex;flex-direction:column;justify-content:center}
  .big-value{font-family:var(--mono);font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1;color:#fff}
  .big-label{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.4}
  .sub-info{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
  .card-footer{font-family:var(--mono);font-size:10px;color:var(--muted);padding-top:10px;border-top:1px solid var(--border);letter-spacing:.08em}
  .weather-icon{font-size:2.4rem;line-height:1;margin-bottom:4px}
  .flag-big{font-size:3rem;line-height:1}
  .loading{font-family:var(--mono);font-size:11px;color:var(--muted);animation:pulse 1.2s infinite;letter-spacing:.1em}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .fact-text{font-size:14px;line-height:1.7;color:var(--text)}
  .tag{display:inline-block;padding:2px 8px;font-family:var(--mono);font-size:10px;border-radius:3px;border:1px solid var(--border-bright);color:var(--theme-accent,#7eb4ff);letter-spacing:.08em;margin-top:6px}
  .bar-row{display:flex;align-items:center;gap:8px;margin-top:6px}
  .bar-track{flex:1;height:4px;background:var(--border);border-radius:2px}
  .bar-fill{height:100%;border-radius:2px}
  .bar-label{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:28px;text-align:right}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .colon{animation:blink 1s step-start infinite}

  /* RUBIK NET */
  .cube-net-wrap{display:flex;justify-content:center}
  .cube-net{display:inline-grid;grid-template-columns:repeat(4,auto);grid-template-rows:repeat(3,auto);gap:4px}
  .cube-face{display:grid;grid-template-columns:repeat(3,20px);grid-template-rows:repeat(3,20px);gap:2px;padding:3px;background:rgba(255,255,255,0.06);border-radius:3px}
  .cube-face.hidden{visibility:hidden}
  .cs{width:20px;height:20px;border-radius:2px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.4)}

  /* PALETTE */
  .palette-row{display:flex;height:52px;border-radius:4px;overflow:hidden;margin-bottom:10px}
  .palette-swatch{flex:1;position:relative}
  .palette-swatch:hover .swatch-hex{opacity:1}
  .swatch-hex{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:7px;color:rgba(255,255,255,.9);opacity:0;transition:opacity .15s;white-space:nowrap;text-shadow:0 0 4px rgba(0,0,0,.9)}

  /* ASCII */
  .ascii-art{font-family:var(--mono);font-size:12px;line-height:1.5;color:var(--text);white-space:pre}

  /* TYPING */
  .typing-target{font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--muted);border-left:2px solid var(--theme-accent,#3b82f6);padding-left:10px;margin-bottom:8px}
  .typing-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border-bright);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;outline:none;transition:border-color .2s}
  .typing-input:focus{border-color:var(--theme-accent,#3b82f6)}
  .typing-input.correct{border-color:#22c55e}
  .typing-input.wrong{border-color:#ef4444}
  .typing-stat{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px}

  /* WORDLE */
  .wordle-grid{display:flex;flex-direction:column;gap:4px;align-items:center;margin-bottom:10px}
  .wordle-row{display:flex;gap:4px}
  .wordle-cell{width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:15px;font-weight:700;text-transform:uppercase;
    border:2px solid var(--border);border-radius:3px;color:var(--text);transition:background-color .2s,border-color .2s}
  .wordle-cell.wordle-hit{background:#22c55e;border-color:#22c55e;color:#fff}
  .wordle-cell.wordle-present{background:#eab308;border-color:#eab308;color:#fff}
  .wordle-cell.wordle-miss{background:rgba(255,255,255,0.06);border-color:var(--border);color:var(--muted)}
  .wordle-keyboard{display:flex;flex-direction:column;gap:5px;align-items:center}
  .wordle-kbrow{display:flex;gap:4px;justify-content:center}
  .wordle-key{font-family:var(--mono);font-size:10px;font-weight:700;padding:8px 5px;min-width:20px;
    border:none;border-radius:3px;background:rgba(255,255,255,0.08);color:var(--text);cursor:pointer;
    transition:background-color .15s;flex:1}
  .wordle-key:hover{background:rgba(255,255,255,0.16)}
  .wordle-key-wide{flex:1.6;font-size:9px}
  .wordle-key-hit{background:#22c55e;color:#fff}
  .wordle-key-present{background:#eab308;color:#fff}
  .wordle-key-miss{background:rgba(255,255,255,0.03);color:var(--muted)}

  /* MINESWEEPER */
  .mine-grid{display:grid;gap:2px;justify-content:center;margin:0 auto 6px;width:max-content}
  .mine-cell{width:26px;height:26px;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:12px;font-weight:700;border-radius:2px;
    background:rgba(255,255,255,0.08);cursor:pointer;user-select:none;-webkit-user-select:none;
    -webkit-touch-callout:none;touch-action:manipulation;transition:background-color .1s}
  .mine-cell:hover{background:rgba(255,255,255,0.14)}
  .mine-cell.mine-revealed{background:rgba(255,255,255,0.03);cursor:default}
  .mine-cell.mine-boom{background:#ef4444}

  /* BINARY */
  .binary-row{display:flex;gap:3px;flex-wrap:wrap;margin:6px 0}
  .bit{width:24px;height:30px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;border-radius:3px;border:1px solid var(--border)}
  .bit.one{color:#7eb4ff;border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08)}
  .bit.zero{color:var(--muted)}

  /* MOON */
  .moon-display{font-size:3.5rem;line-height:1}

  /* ON THIS DAY */
  .year-badge{font-family:var(--mono);font-size:2rem;font-weight:700;color:#fff;line-height:1}

  /* PASTE-BLOCK POPUP */
  .paste-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(0);background:#181d2c;border:1px solid var(--border-bright);color:var(--text);font-family:var(--mono);font-size:13px;letter-spacing:.04em;padding:12px 20px;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.45);z-index:10000;opacity:0;transition:opacity .2s, transform .2s;pointer-events:none}
  .paste-toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
</style>
</head>
<body>

<header>
  <h1>EVERY.THING</h1>
  <p id="tagline">A new universe &nbsp;/&nbsp; <span id="ts"></span></p>
</header>

<div class="grid" id="grid"></div>

<script>
const ACCENTS=['blue','teal','amber','pink','green','violet','red','cyan','orange','lime'];
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function card(accent,label,html,footer,bg){
  return '<div class="card accent-'+accent+'">'+
    (bg?'<div class="card-bg">'+bg+'</div>':'')+
    '<div class="card-label"><span class="dot"></span>'+label+'</div>'+
    '<div class="card-main">'+html+'</div>'+
    (footer?'<div class="card-footer">'+footer+'</div>':'')+
  '</div>';
}

/* ── CARD BACKGROUND TOOLKIT ─────────────────
   Small reusable generators for the decorative full-bleed layer that
   sits behind every widget's content. Each returns an SVG fragment
   (viewBox 0 0 300 200, stretched via CSS to fill the card) so callers
   can mix and match. Kept low-opacity/low-contrast so text stays
   legible on top. */
const BG_W=300,BG_H=200;
function bgWrapSVG(inner,opacity){
  return '<svg viewBox="0 0 '+BG_W+' '+BG_H+'" preserveAspectRatio="none" style="width:100%;height:100%;display:block;opacity:'+(opacity??1)+'">'+inner+'</svg>';
}
// Scattered dots/stars, e.g. for space, night, or "sparkle" themes
function bgStars(count,color){
  color=color||'#fff';
  const dots=Array.from({length:count},()=>{
    const x=(Math.random()*BG_W).toFixed(2),y=(Math.random()*BG_H).toFixed(2);
    const r=(0.4+Math.random()*0.9).toFixed(2),o=(0.08+Math.random()*0.22).toFixed(3);
    return '<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="'+color+'" opacity="'+o+'"/>';
  }).join('');
  return bgWrapSVG(dots,1);
}
// Faint grid lines, e.g. for technical/data/coordinate themes
function bgGrid(spacing,color){
  spacing=spacing||24;color=color||'rgba(120,150,220,0.12)';
  let l='';
  for(let x=0;x<=BG_W;x+=spacing)l+='<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+BG_H+'" stroke="'+color+'" stroke-width="1"/>';
  for(let y=0;y<=BG_H;y+=spacing)l+='<line x1="0" y1="'+y+'" x2="'+BG_W+'" y2="'+y+'" stroke="'+color+'" stroke-width="1"/>';
  return bgWrapSVG(l,1);
}
// Soft radial glow in a corner, e.g. warm/cozy or "energy" themes
function bgGlow(color,cx,cy,r){
  cx=cx??BG_W*0.8;cy=cy??BG_H*0.15;r=r||160;
  const id='glow'+Math.random().toString(36).slice(2,7);
  return bgWrapSVG(
    '<defs><radialGradient id="'+id+'" cx="50%" cy="50%" r="50%">'+
      '<stop offset="0%" stop-color="'+color+'" stop-opacity="0.35"/>'+
      '<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/>'+
    '</radialGradient></defs>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="url(#'+id+')"/>',1);
}
// Diagonal stripes, e.g. for caution/alert/sport themes
function bgStripes(color,gap){
  color=color||'rgba(245,158,11,0.06)';gap=gap||26;
  let s='';
  for(let x=-BG_H;x<BG_W+BG_H;x+=gap)s+='<line x1="'+x+'" y1="0" x2="'+(x+BG_H)+'" y2="'+BG_H+'" stroke="'+color+'" stroke-width="10"/>';
  return bgWrapSVG(s,1);
}
// Concentric ripples/waves, e.g. for water, sound, signal themes
function bgRipples(color,cx,cy){
  color=color||'rgba(100,180,255,0.1)';cx=cx??BG_W/2;cy=cy??BG_H/2;
  let r='';
  for(let i=1;i<=5;i++)r+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(i*22)+'" fill="none" stroke="'+color+'" stroke-width="1"/>';
  return bgWrapSVG(r,1);
}
// Repeating dot matrix, e.g. for digital/binary/code themes
function bgDotMatrix(spacing,color){
  spacing=spacing||14;color=color||'rgba(125,180,255,0.15)';
  let d='';
  for(let x=spacing/2;x<BG_W;x+=spacing)for(let y=spacing/2;y<BG_H;y+=spacing)d+='<circle cx="'+x+'" cy="'+y+'" r="1" fill="'+color+'"/>';
  return bgWrapSVG(d,1);
}
// Topographic-style wavy contour lines, e.g. for geography/nature themes
function bgContours(color){
  color=color||'rgba(120,200,160,0.1)';
  let c='';
  for(let i=0;i<5;i++){
    const yOff=20+i*36,amp=8+i*2;
    c+='<path d="M 0 '+yOff+' Q 75 '+(yOff-amp)+' 150 '+yOff+' T 300 '+yOff+'" fill="none" stroke="'+color+'" stroke-width="1.5"/>';
  }
  return bgWrapSVG(c,1);
}

/* ── WILD CARD BACKGROUNDS ────────────────────
   A second, louder tier on top of the calm bgStars/bgGrid/etc. toolkit
   above — chaotic, clashing, "did my browser just glitch" energy.
   Every widget gets a small random chance (via maybeWeirdBg) to roll
   one of these instead of its normal plain background. Still kept
   under the content layer (.card-bg is z-index:0, text is z-index:1)
   and at modest opacity so nothing becomes unreadable. */

// Lava-lamp blobs: two soft, oversized blurred radial blooms
function bgLavaLamp(){
  const c1=pick(['#ff6b6b','#feca57','#48dbfb','#1dd1a1','#ff9ff3','#f368e0']);
  const c2=pick(['#5f27cd','#00d2d3','#ff9f43','#ee5253','#10ac84','#341f97']);
  const x1=rnd(10,90),y1=rnd(10,90),x2=rnd(10,90),y2=rnd(10,90);
  return '<div style="position:absolute;inset:0;filter:blur(22px);opacity:0.55;background:'+
    'radial-gradient(circle at '+x1+'% '+y1+'%, '+c1+', transparent 45%),'+
    'radial-gradient(circle at '+x2+'% '+y2+'%, '+c2+', transparent 50%)"></div>';
}
// Glitch scanlines: stray RGB-tinted horizontal bars, screen-blended
function bgGlitchBars(){
  const bars=Array.from({length:7},()=>{
    const y=rnd(0,95),h=rnd(2,6),x1=rnd(-10,30),x2=rnd(70,110);
    const c=pick(['#ff004055','#00ffea55','#ffee0050','#ff00ff50']);
    return '<div style="position:absolute;left:'+x1+'%;right:'+(100-x2)+'%;top:'+y+'%;height:'+h+'%;background:'+c+';mix-blend-mode:screen"></div>';
  }).join('');
  return '<div style="position:absolute;inset:0;background:#0a0a0a;opacity:0.5">'+bars+'</div>';
}
// Rave checkerboard: rotated repeating conic wedges
function bgRaveGrid(){
  const c=pick(['#ff0080','#00ff80','#ff8000','#8000ff','#00ffff']);
  const sz=rnd(16,34),rot=rnd(0,45);
  return '<div style="position:absolute;inset:-20%;opacity:0.22;transform:rotate('+rot+'deg);'+
    'background-image:repeating-conic-gradient('+c+' 0% 25%, transparent 0% 50%);'+
    'background-size:'+sz+'px '+sz+'px"></div>';
}
// Confetti burst: scattered random rotated rectangles
function bgConfetti(){
  const colors=['#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#ff6f59'];
  const pieces=Array.from({length:22},()=>{
    const x=rnd(0,100),y=rnd(0,100),rot=rnd(0,360),sz=rnd(3,7);
    const c=pick(colors);
    return '<div style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+(sz*2.2).toFixed(0)+'px;background:'+c+';opacity:0.5;transform:rotate('+rot+'deg)"></div>';
  }).join('');
  return '<div style="position:absolute;inset:0">'+pieces+'</div>';
}
// TV static / snow noise
function bgStatic(){
  const dots=Array.from({length:140},()=>{
    const x=(Math.random()*100).toFixed(1),y=(Math.random()*100).toFixed(1);
    const v=rnd(0,1)?'#fff':'#000';
    const op=(Math.random()*0.4+0.08).toFixed(2);
    return '<div style="position:absolute;left:'+x+'%;top:'+y+'%;width:2px;height:2px;background:'+v+';opacity:'+op+'"></div>';
  }).join('');
  return '<div style="position:absolute;inset:0;background:#111;opacity:0.6">'+dots+'</div>';
}
// 80s sunset gradient with retro horizon scanlines
function bgSynthSunset(){
  const top=pick(['#2d1b4e','#1a0533','#0f0524','#3a0ca3']);
  const mid=pick(['#ff6b9d','#ff8c42','#f72585']);
  const bot=pick(['#ffd23f','#ff9f1c','#f9c80e']);
  return '<div style="position:absolute;inset:0;opacity:0.45;background:linear-gradient(180deg,'+top+' 0%,'+mid+' 55%,'+bot+' 100%)">'+
    '<div style="position:absolute;bottom:0;left:0;right:0;height:40%;background:repeating-linear-gradient(0deg,transparent,transparent 6px,#00000040 6px,#00000040 8px)"></div>'+
  '</div>';
}
// Spinning sunburst rays
function bgSunburst(){
  const c=pick(['#ffbe0b','#fb5607','#ff006e','#8338ec','#3a86ff']);
  const rot=rnd(0,90);
  return '<div style="position:absolute;inset:-30%;opacity:0.22;transform:rotate('+rot+'deg);'+
    'background:repeating-conic-gradient('+c+' 0deg 8deg, transparent 8deg 16deg)"></div>';
}
// Floating soft bubbles, random sizes
function bgBubbles(){
  const c=pick(['#a8e6cf','#dcedc1','#ffd3b6','#ffaaa5','#ff8b94','#a6d8d4']);
  const bubbles=Array.from({length:13},()=>{
    const x=rnd(0,100),y=rnd(0,100),sz=rnd(8,36);
    return '<div style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c+';opacity:0.25"></div>';
  }).join('');
  return '<div style="position:absolute;inset:0">'+bubbles+'</div>';
}
// Crayon scribble squiggle, SVG quadratic path
function bgScribble(){
  const c=pick(['#ff595e','#ffca3a','#1982c4','#6a4c93','#8ac926']);
  let path='M '+rnd(0,300)+' '+rnd(0,200);
  for(let i=0;i<6;i++)path+=' Q '+rnd(0,300)+' '+rnd(0,200)+' '+rnd(0,300)+' '+rnd(0,200);
  return bgWrapSVG('<path d="'+path+'" stroke="'+c+'" stroke-width="3" fill="none" stroke-linecap="round"/>',0.3);
}
// Matrix-style falling glyph rain
function bgCodeRain(){
  const chars='01アイウエオカキクケコ$#%&@';
  const cols=Array.from({length:9},()=>{
    const x=rnd(0,95);
    const str=Array.from({length:9},()=>chars[rnd(0,chars.length-1)]).join('<br>');
    const delay=(Math.random()*2).toFixed(2);
    return '<div style="position:absolute;left:'+x+'%;top:-20%;font-family:monospace;font-size:9px;line-height:1.3;color:#39ff14;opacity:0.3;animation:bgFall 4s linear '+delay+'s infinite">'+str+'</div>';
  }).join('');
  return '<div style="position:absolute;inset:0;background:#000;opacity:0.55;overflow:hidden">'+cols+
    '<style>@keyframes bgFall{from{transform:translateY(0)}to{transform:translateY(220%)}}</style></div>';
}
// Holographic foil shimmer band
function bgHolofoil(){
  const angle=rnd(20,160);
  return '<div style="position:absolute;inset:0;opacity:0.2;background:linear-gradient('+angle+'deg,'+
    '#ff003c,#ff8a00,#fabd05,#3cba54,#4885ed,#7b2ff7,#ff003c)"></div>';
}
// Cracked glass fracture lines radiating from one point
function bgCrackedGlass(){
  const cx=rnd(60,240),cy=rnd(40,160);
  const cracks=Array.from({length:9},()=>{
    const a=Math.random()*Math.PI*2,len=rnd(40,140);
    const x2=(cx+Math.cos(a)*len).toFixed(1),y2=(cy+Math.sin(a)*len).toFixed(1);
    return '<line x1="'+cx+'" y1="'+cy+'" x2="'+x2+'" y2="'+y2+'" stroke="#ffffff50" stroke-width="1"/>';
  }).join('');
  return bgWrapSVG('<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="#ffffff66"/>'+cracks,0.6);
}

// Pool of every wild generator, ready to pick() from at random.
const WILD_BACKGROUNDS=[
  bgLavaLamp,bgGlitchBars,bgRaveGrid,bgConfetti,bgStatic,bgSynthSunset,
  bgSunburst,bgBubbles,bgScribble,bgCodeRain,bgHolofoil,bgCrackedGlass,
];

// Rolls `chance` (0–1) odds that this render gets a random wild
// background; otherwise returns null so card() falls back to its
// normal plain surface color. Pass the result as card()'s 5th arg:
//   return card('teal','📍 LABEL', html, footer, maybeWeirdBg(0.12));
function maybeWeirdBg(chance){
  if(Math.random()<chance)return pick(WILD_BACKGROUNDS)();
  return null;
}

let _toastEl=null;
let _toastTimer=null;
function showToast(msg){
  if(!_toastEl){
    _toastEl=document.createElement('div');
    _toastEl.className='paste-toast';
    document.body.appendChild(_toastEl);
  }
  _toastEl.textContent=msg;
  clearTimeout(_toastTimer);
  requestAnimationFrame(()=>_toastEl.classList.add('show'));
  _toastTimer=setTimeout(()=>{_toastEl.classList.remove('show')},1600);
}

/* ── RUBIK ─────────────────────────────────── */
const FACE_COLORS={U:'#f8fafc',D:'#fbbf24',F:'#ef4444',B:'#f97316',R:'#3b82f6',L:'#22c55e'};
const FACE_KEYS=['U','F','R','L','B','D'];
const SMOVES=['U',"U'","U2",'D',"D'","D2",'R',"R'","R2",'L',"L'","L2",'F',"F'","F2",'B',"B'","B2"];

function genScramble(){
  const mv=[];let last='';
  for(let i=0;i<20;i++){let m;do{m=pick(SMOVES)}while(m[0]===last);last=m[0];mv.push(m)}
  return mv;
}

function randomFace(faceIdx,seed){
  const keys=FACE_KEYS;
  const out=[];
  for(let i=0;i<9;i++){
    const idx=(seed*7+faceIdx*13+i*3)%6;
    out.push(FACE_COLORS[keys[idx]]);
  }
  out[4]=FACE_COLORS[keys[faceIdx]]; // center stays correct
  return out;
}

function renderFace(stickers){
  return '<div class="cube-face">'+
    stickers.map(c=>'<div class="cs" style="background:'+c+'"></div>').join('')+
  '</div>';
}

function widgetRubik(){
  const seed=rnd(1,9999);
  const faceStickers={};
  FACE_KEYS.forEach((k,i)=>faceStickers[k]=randomFace(i,seed));

  // Cross-net layout (4 cols × 3 rows):
  //  col1    col2    col3    col4
  //  [gap]   [U]     [gap]   [gap]    row1
  //  [L]     [F]     [R]     [B]      row2
  //  [gap]   [D]     [gap]   [gap]    row3
  function gapCell(){return '<div class="cube-face hidden"></div>'}

  const net=
    gapCell()+renderFace(faceStickers.U)+gapCell()+gapCell()+
    renderFace(faceStickers.L)+renderFace(faceStickers.F)+renderFace(faceStickers.R)+renderFace(faceStickers.B)+
    gapCell()+renderFace(faceStickers.D)+gapCell()+gapCell();

  const sc=genScramble();
  const scHtml=sc.map(m=>'<span style="color:'+(m.includes("'")?'#f97316':m.includes('2')?'#a78bfa':'#7eb4ff')+'">'+m+'</span>').join(' ');

  return card('violet','🧩 RUBIK\'S CUBE',
    '<div class="cube-net-wrap"><div class="cube-net">'+net+'</div></div>'+
    '<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:10px;line-height:2;letter-spacing:.02em">'+scHtml+'</div>',
    'All 6 faces shown · random state · 20-move scramble'
  ,maybeWeirdBg(0.14));
}

/* ── CONSTELLATION ─────────────────────────── */
function widgetConstellation(){
  const c=pick(CONSTELLATIONS);const W=240,H=200;
  const aX=c.stars.map(s=>s[0]),aY=c.stars.map(s=>s[1]);
  const minX=Math.min(...aX),maxX=Math.max(...aX),minY=Math.min(...aY),maxY=Math.max(...aY);
  const sc=Math.min((W-40)/(maxX-minX||1),(H-40)/(maxY-minY||1));
  const ox=(W-(maxX-minX)*sc)/2-minX*sc,oy=(H-(maxY-minY)*sc)/2-minY*sc;
  const pts=c.stars.map(([x,y])=>[x*sc+ox,y*sc+oy]);
  const lines=c.lines.map(([a,b])=>'<line x1="'+pts[a][0].toFixed(1)+'" y1="'+pts[a][1].toFixed(1)+'" x2="'+pts[b][0].toFixed(1)+'" y2="'+pts[b][1].toFixed(1)+'" stroke="rgba(100,160,255,0.2)" stroke-width="1"/>').join('');
  const stars=pts.map(([x,y],i)=>'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(i===0?4:2.5)+'" fill="'+(i===0?'#7eb4ff':'#a5c4fa')+'" opacity="0.9"/>').join('');
  // 90 background stars at higher sub-pixel precision (3 decimals on
  // position, 3 on opacity) — purely decorative, invisible to the eye,
  // but each star now spans roughly 240,000×200,000×1,000 positions
  // instead of 2,400×2,000×26, massively widening the page's possible-
  // states space without changing how it looks.
  const bg=Array.from({length:90},()=>'<circle cx="'+(Math.random()*W).toFixed(3)+'" cy="'+(Math.random()*H).toFixed(3)+'" r="0.8" fill="#fff" opacity="'+(0.1+Math.random()*0.25).toFixed(3)+'"/>').join('');
  return card('blue','✨ CONSTELLATION',
    '<svg viewBox="0 0 '+W+' '+H+'" style="max-width:100%;display:block">'+bg+lines+stars+'</svg>'+
    '<div class="big-label" style="text-align:center">'+c.name+'</div>',
    'Not to scale'
  ,maybeWeirdBg(0.14));
}

    inp.addEventListener('input',()=>{
      if(!startTime&&inp.value.length>0)startTime=Date.now();
      const val=inp.value;const correct=sentence.startsWith(val);
      inp.classList.toggle('correct',val===sentence);
      inp.classList.toggle('wrong',!correct&&val.length>0);
      if(val===sentence){
        const el=((Date.now()-startTime)/1000).toFixed(1);
        const wpm=Math.round((sentence.split(' ').length/el)*60);
        stat.textContent='✓ Done in '+el+'s · ~'+wpm+' WPM';stat.style.color='#22c55e';
      }else if(!correct){
        stat.textContent='✗ Error at position '+val.length;stat.style.color='#ef4444';
      }else{
        const pct=Math.round((val.length/sentence.length)*100);
        stat.textContent=pct+'% · '+(sentence.length-val.length)+' chars remaining';stat.style.color='';
      }
    });
  },100);
  return html;
}

/* ── MOON PHASE ────────────────────────────── */
function widgetMoon(){
  const now=new Date();
  const knownNew=new Date('2024-01-11');
  const daysSince=(now-knownNew)/(864e5);
  const lunarDay=((daysSince%29.53)+29.53)%29.53;
  const idx=Math.floor((lunarDay/29.53)*8)%8;
  const phase=MOON_PHASES[idx];
  const nextFull=14.77-(lunarDay%29.53);
  const daysToFull=nextFull>0?Math.ceil(nextFull):Math.ceil(nextFull+29.53);
  return card('violet','🌙 MOON PHASE',
    '<div class="moon-display">'+phase.symbol+'</div>'+
    '<div class="big-value" style="font-size:1.4rem;margin-top:6px">'+phase.name+'</div>'+
    '<div class="sub-info" style="margin-top:6px">Lunar day '+Math.floor(lunarDay+1)+' of 29.5</div>'+
    '<div style="margin-top:10px"><div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.15em;margin-bottom:4px">ILLUMINATION</div>'+
    '<div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:'+phase.illumination+'%;background:#a78bfa"></div></div><div class="bar-label">'+phase.illumination+'%</div></div></div>'+
    '<div class="sub-info" style="margin-top:4px">Next full moon in ~'+daysToFull+' days</div>',
    'Calculated from lunar cycle · not location-specific'
  ,maybeWeirdBg(0.16));
}

function chessBoardSVG(moves){
  const files='abcdefgh';
  const sq=28,N=8;
  let cells='';
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const dark=(r+c)%2===1;
      cells+='<rect x="'+(c*sq)+'" y="'+(r*sq)+'" width="'+sq+'" height="'+sq+'" fill="'+(dark?'#1a2236':'#262f48')+'"/>';
    }
  }
  // mark destination squares of each move (best-effort: only squares explicitly named, ignoring captures/checks)
  let dots='';
  moves.forEach((m,i)=>{
    const match=m.match(/([a-h])([1-8])/);
    if(!match)return;
    const file=files.indexOf(match[1]),rank=8-parseInt(match[2],10);
    const cx=file*sq+sq/2,cy=rank*sq+sq/2;
    dots+='<circle cx="'+cx+'" cy="'+cy+'" r="6" fill="none" stroke="#7eb4ff" stroke-width="2" opacity="'+(0.4+i*0.12).toFixed(2)+'"/>'+
      '<text x="'+cx+'" y="'+(cy+3)+'" font-size="8" fill="#aad0ff" text-anchor="middle" font-family="var(--mono)">'+(i+1)+'</text>';
  });
  return '<svg viewBox="0 0 '+(sq*N)+' '+(sq*N)+'" style="width:140px;height:140px;flex-shrink:0;border-radius:3px">'+cells+dots+'</svg>';
}
function widgetChessOpening(){
  const o=pick(CHESS_OPENINGS);
  const moveStr=o.moves.map((m,i)=>(i%2===0?(Math.floor(i/2)+1)+'.':'')+m).join(' ');
  return card('green','♞ CHESS OPENING',
    '<div style="display:flex;gap:14px;align-items:flex-start">'+
      chessBoardSVG(o.moves)+
      '<div>'+
        '<div style="font-size:16px;font-weight:600;color:var(--text)">'+o.name+'</div>'+
        '<div class="sub-info" style="margin-top:3px">ECO '+o.eco+'</div>'+
        '<div class="fact-text" style="font-size:12px;margin-top:6px;font-family:var(--mono);color:#7eb4ff">'+moveStr+'</div>'+
        '<div class="fact-text" style="font-size:12px;margin-top:6px;color:var(--muted)">'+o.note+'</div>'+

    'Opening theory'
  ,maybeWeirdBg(0.18));

function worldDotsSVG(lat,lon){
  const W=240,H=130;
  const x=((lon+180)/360)*W;
  const y=((90-lat)/180)*H;
  // faint lat/long grid
  let grid='';
  for(let gx=0;gx<=W;gx+=W/12){grid+='<line x1="'+gx+'" y1="0" x2="'+gx+'" y2="'+H+'" stroke="rgba(100,140,220,0.08)"/>'}
  for(let gy=0;gy<=H;gy+=H/6){grid+='<line x1="0" y1="'+gy+'" x2="'+W+'" y2="'+gy+'" stroke="rgba(100,140,220,0.08)"/>'}
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;background:rgba(255,255,255,0.02);border-radius:4px">'+
    grid+
    '<line x1="0" y1="'+(H/2)+'" x2="'+W+'" y2="'+(H/2)+'" stroke="rgba(100,160,255,0.18)" stroke-dasharray="3,3"/>'+
    '<line x1="'+(W/2)+'" y1="0" x2="'+(W/2)+'" y2="'+H+'" stroke="rgba(100,160,255,0.18)" stroke-dasharray="3,3"/>'+
    '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="9" fill="none" stroke="#7eb4ff" stroke-width="1.5" opacity="0.5"/>'+
    '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3.5" fill="#7eb4ff"/>'+
  '</svg>';
}
function widgetCoordinate(){
  const lat=(Math.random()*180-90);

const MOVIE_FALLBACK=[

  {title:'Pulp Fiction',year:'1994',extract:'A nonlinear crime film weaving together several interconnected Los Angeles stories, known for its sharp dialogue and soundtrack.'},

  {title:'The Shining',year:'1980',extract:'A psychological horror film set in an isolated, haunted hotel, based on the novel by Stephen King.'},
];
// Wikidata holds a SPARQL-queryable graph of essentially every film with
// metadata. We grab one at a random offset that has a poster image
// (P3383) attached, then pull a real prose summary from Wikipedia's REST
// API for that same title — much richer than any single Wikidata field.
const MOVIE_COUNT_SPARQL=
  'SELECT (COUNT(*) AS ?count) WHERE {'+
  '  ?film wdt:P31 wd:Q11424 ; wdt:P3383 ?image .'+
  '}';
const MOVIE_SPARQL=
  'SELECT ?film ?filmLabel ?image ?year WHERE {'+
  '  ?film wdt:P31 wd:Q11424 ; wdt:P3383 ?image .'+
  '  OPTIONAL { ?film wdt:P577 ?pubdate. BIND(YEAR(?pubdate) AS ?year) }'+
  '  SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }'+
  '} LIMIT 1 OFFSET ';
// Cached so we only pay the COUNT query once per page load, not once
// per widget refresh. A conservative hardcoded fallback covers the
// (rare) case where even the count query fails.
let _movieCountCache=null;
async function getMovieCount(){
  if(_movieCountCache)return _movieCountCache;
  const url='https://query.wikidata.org/sparql?format=json&query='+
    encodeURIComponent(MOVIE_COUNT_SPARQL);
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),7000);
  try{
    const res=await fetch(url,{signal:controller.signal,headers:{'Accept':'application/sparql-results+json'}});
    if(!res.ok)throw new Error('bad response: '+res.status);
    const d=await res.json();
    const n=parseInt(d.results.bindings[0].count.value,10);
    if(!n||n<1)throw new Error('bad count');
    _movieCountCache=n;
    return n;
  }finally{
    clearTimeout(timer);
  }
}
async function fetchWikidataFilm(){
  // Pick a random offset within the *real* size of the films-with-posters
  // set (rather than a guessed ceiling) so we don't keep landing past
  // the end of the data and getting empty results back.
  let count;
  try{ count=await getMovieCount(); }
  catch{ count=4000; } // conservative fallback if the COUNT query itself fails
  const offset=Math.floor(Math.random()*count);
  const url='https://query.wikidata.org/sparql?format=json&query='+
    encodeURIComponent(MOVIE_SPARQL+offset);
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),7000);
  try{
    const res=await fetch(url,{signal:controller.signal,headers:{'Accept':'application/sparql-results+json'}});
    if(!res.ok)throw new Error('bad response: '+res.status);
    const d=await res.json();
    const row=(d.results&&d.results.bindings&&d.results.bindings[0]);
    if(!row||!row.filmLabel)throw new Error('empty result at offset '+offset+' of '+count);
    return {
      title:row.filmLabel.value,
      year:row.year?row.year.value:'',
      image:row.image?row.image.value:null
    };
  }finally{
    clearTimeout(timer);
  }
}
async function fetchWikipediaExtract(title){
  const url='https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(title.replace(/ /g,'_'));
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),6000);
  try{
    const res=await fetch(url,{signal:controller.signal});
    if(!res.ok)throw new Error('bad response: '+res.status);
    const d=await res.json();
    return d.extract||null;
  }finally{
    clearTimeout(timer);
  }
}

}

  {title:'Dune',author:'Frank Herbert',subject:'Science Fiction'},
  {title:'The Hobbit',author:'J.R.R. Tolkien',subject:'Fantasy'},
  {title:'1984',author:'George Orwell',subject:'Dystopian'},
  {title:'Beloved',author:'Toni Morrison',subject:'Literary Fiction'},
  {title:'Sapiens',author:'Yuval Noah Harari',subject:'Nonfiction'},
];
const BOOK_SUBJECTS=['fiction','fantasy','mystery','romance','science_fiction','horror','poetry','history','philosophy','biography','adventure','thriller','classics','drama','comics'];
function widgetBook(){
  const div=document.createElement('div');
  div.innerHTML=card('cyan','📚 RANDOM BOOK','<div class="loading">Browsing the stacks…</div>','openlibrary.org · live API');
  setTimeout(async()=>{
    try{
      const subject=pick(BOOK_SUBJECTS);
      const offset=Math.floor(Math.random()*150);
      const url='https://openlibrary.org/subjects/'+subject+'.json?limit=1&offset='+offset;
      const res=await fetch(url);
      if(!res.ok)throw new Error('bad response');
      const d=await res.json();
      const w=(d.works||[])[0];
      if(!w)throw new Error('empty');
      const author=(w.authors||[])[0]?.name||'Unknown author';
      const cover=w.cover_id?'https://covers.openlibrary.org/b/id/'+w.cover_id+'-L.jpg':'';
      div.innerHTML=card('cyan','📚 RANDOM BOOK',
        (cover?'<img src="'+cover+'" style="width:100%;border-radius:4px;display:block;margin-bottom:10px" loading="lazy">':'')+
        '<div class="big-label" style="font-size:15px;color:var(--text)">'+w.title+'</div>'+
        '<div class="sub-info" style="margin-top:2px">'+author+'</div>'+
        '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">'+
          '<span class="tag" style="text-transform:capitalize">'+subject.replace('_',' ')+'</span>'+
          (w.first_publish_year?'<span class="tag">'+w.first_publish_year+'</span>':'')+
        '</div>',
        'openlibrary.org · live, from the '+subject.replace('_',' ')+' shelf'
      ,maybeWeirdBg(0.1));
    }catch{
      const b=pick(BOOK_FALLBACK);
      div.innerHTML=card('cyan','📚 RANDOM BOOK',
        '<div class="big-label" style="font-size:15px;color:var(--text)">'+b.title+'</div>'+
        '<div class="sub-info" style="margin-top:2px">'+b.author+'</div>'+
        '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">'+
          '<span class="tag">'+b.subject+'</span>'+
        '</div>',
        'Offline fallback · API unreachable'
      ,maybeWeirdBg(0.1));
    }
  },50);
  return div;
}

function idChecksumCode(){
  // 10-character code: 4 letters + 5 digits + 1 letter — gives the
  // "official document number" look without claiming to mean anything.
  const L=()=>String.fromCharCode(65+rnd(0,25));
  let s='';
  for(let i=0;i<4;i++)s+=L();
  s+=rnd(10000,99999);
  s+=L();
  return s;
}
// Procedural blocky portrait — an 8x10 grid of randomized "pixels" in a
// muted duotone palette, rendered as an SVG so it scales crisply at any
// size, evoking the low-res scanner photos on inspection-booth ID cards.
function idPortraitSVG(skinTone,hairTone){
  const cols=8,rows=10,cell=8;
  let rects='';
  // Background
  rects+='<rect x="0" y="0" width="'+(cols*cell)+'" height="'+(rows*cell)+'" fill="#1a1f2e"/>';
  // Hair block (top rows, randomized jagged edge)
  for(let x=0;x<cols;x++){
    const hairRows=rnd(2,4);
    for(let y=0;y<hairRows;y++){
      if(Math.random()<0.85)rects+='<rect x="'+(x*cell)+'" y="'+(y*cell)+'" width="'+cell+'" height="'+cell+'" fill="'+hairTone+'"/>';
    }
  }
  // Face block (middle rows)
  for(let x=1;x<cols-1;x++){
    for(let y=3;y<8;y++){
      rects+='<rect x="'+(x*cell)+'" y="'+(y*cell)+'" width="'+cell+'" height="'+cell+'" fill="'+skinTone+'"/>';
    }
  }
  // Eyes (two dark pixels)
  rects+='<rect x="'+(2*cell)+'" y="'+(5*cell)+'" width="'+cell+'" height="'+cell+'" fill="#1a1f2e"/>';
  rects+='<rect x="'+(5*cell)+'" y="'+(5*cell)+'" width="'+cell+'" height="'+cell+'" fill="#1a1f2e"/>';
  // Shoulders/collar (bottom rows)
  for(let x=0;x<cols;x++){
    rects+='<rect x="'+(x*cell)+'" y="'+(8*cell)+'" width="'+cell+'" height="'+(cell*2)+'" fill="#2a3142"/>';
  }
  return '<svg viewBox="0 0 '+(cols*cell)+' '+(rows*cell)+'" style="width:72px;height:90px;image-rendering:pixelated;border:1px solid #4a5568;flex-shrink:0">'+rects+'</svg>';
}

/* ── SHADE MATCH (interactive color game) ────
   Shows a randomly generated target swatch; the player drags hue/
   lightness sliders to mix a matching color, then locks it in to see
   how close they got. Genuinely random each time (target hue/lightness,
   plus the player's own freeform input), unlike the static palette
   widget above which just displays a fixed set of swatches. */
function shadeDist(h1,l1,h2,l2){
  // Hue is circular (0 and 359 are neighbors), so wrap the difference;
  // lightness is linear. Weight hue a bit lower since large hue swings
  // read as "still kind of close" more than equivalent lightness swings.
  let dh=Math.abs(h1-h2);
  if(dh>180)dh=360-dh;
  const dl=Math.abs(l1-l2);
  return Math.sqrt((dh*0.6)**2+(dl*1.4)**2);
}
function shadeTier(dist){
  if(dist<4)return{label:'Perfect eye',color:'#22c55e'};
  if(dist<10)return{label:'Excellent',color:'#84cc16'};
  if(dist<20)return{label:'Pretty close',color:'#eab308'};
  if(dist<35)return{label:'In the ballpark',color:'#f97316'};
  return{label:'Not even close',color:'#ef4444'};
}
function widgetShadeMatch(){
  const targetHue=rnd(0,359);
  const targetSat=rnd(55,85);
  const targetLight=rnd(25,75);
  // Start the sliders at a random position too, instead of a fixed
  // 180/50 — otherwise whenever the random target happened to land near
  // that fixed default, locking in immediately without touching anything
  // scored a "Perfect eye" by sheer luck rather than actual matching.
  const startHue=rnd(0,359);
  const startLight=rnd(10,90);
  const id='sm'+Math.random().toString(36).slice(2);
  const hueId=id+'h',lightId=id+'l',previewId=id+'p',targetId=id+'t',
        btnId=id+'b',resultId=id+'r';
  const html=card('cyan','🎯 SHADE MATCH',
    '<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">'+
      '<div style="flex:1;text-align:center">'+
        '<div id="'+targetId+'" style="height:54px;border-radius:5px;background:hsl('+targetHue+',' +targetSat+'%,'+targetLight+'%);border:1px solid var(--border-bright)"></div>'+
        '<div class="sub-info" style="margin-top:3px">Target</div>'+
      '</div>'+
      '<div style="flex:1;text-align:center">'+
        '<div id="'+previewId+'" style="height:54px;border-radius:5px;background:hsl('+startHue+',60%,'+startLight+'%);border:1px solid var(--border)"></div>'+
        '<div class="sub-info" style="margin-top:3px">Your mix</div>'+
      '</div>'+
    '</div>'+
    '<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:2px">HUE</div>'+
    '<input type="range" id="'+hueId+'" min="0" max="359" value="'+startHue+'" style="width:100%">'+
    '<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin:6px 0 2px">LIGHTNESS</div>'+
    '<input type="range" id="'+lightId+'" min="10" max="90" value="'+startLight+'" style="width:100%">'+
    '<button id="'+btnId+'" style="margin-top:10px;width:100%;padding:7px;border-radius:4px;border:1px solid var(--border-bright);background:transparent;color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.1em;cursor:pointer">LOCK IT IN</button>'+
    '<div id="'+resultId+'" class="sub-info" style="margin-top:8px;min-height:14px"></div>',
    'Match the swatch by eye · saturation fixed'
  ,maybeWeirdBg(0.1));
  setTimeout(()=>{
    const hueEl=document.getElementById(hueId);
    const lightEl=document.getElementById(lightId);
    const preview=document.getElementById(previewId);
    const btn=document.getElementById(btnId);
    const result=document.getElementById(resultId);
    if(!hueEl||!lightEl||!preview||!btn||!result)return;
    let locked=false;
    function updatePreview(){
      preview.style.background='hsl('+hueEl.value+',60%,'+lightEl.value+'%)';
    }
    hueEl.addEventListener('input',updatePreview);
    lightEl.addEventListener('input',updatePreview);
    btn.addEventListener('click',()=>{
      if(locked)return;
      locked=true;
      const dist=shadeDist(targetHue,targetLight,+hueEl.value,+lightEl.value);
      const tier=shadeTier(dist);
      result.innerHTML='<span style="color:'+tier.color+';font-weight:600">'+tier.label+'</span> · off by '+dist.toFixed(1);
      hueEl.disabled=true;lightEl.disabled=true;
      btn.textContent='LOCKED';btn.disabled=true;btn.style.opacity='0.5';btn.style.cursor='default';
    });
  },100);
  return html;
}

// Scores a guess against the target with correct duplicate-letter
// handling: first pass marks exact position matches ('hit') and removes
// those letters from the pool; second pass marks remaining letters
// 'present' only if the target still has an unclaimed copy of them,
// otherwise 'miss'. This avoids the classic clone bug where a guess
// with a repeated letter gets two yellows when the target only has
// one of that letter.
function wordleScore(guess,target){
  const result=new Array(5).fill('miss');
  const pool={};
  for(let i=0;i<5;i++){
    if(guess[i]===target[i]){
      result[i]='hit';
    }else{
      pool[target[i]]=(pool[target[i]]||0)+1;
    }
  }
  for(let i=0;i<5;i++){
    if(result[i]==='hit')continue;
    const c=guess[i];
    if(pool[c]>0){
      result[i]='present';
      pool[c]--;
    }
  }
  return result;
}
function widgetWordle(){
  const target=pick(WORDLE_WORDS);
  const wordSet=new Set(WORDLE_WORDS);
  const id='wd'+Math.random().toString(36).slice(2);
  const gridId=id+'g',keyId=id+'k',msgId=id+'m';
  const ROWS=6;
  let gridHtml='';
  for(let r=0;r<ROWS;r++){
    gridHtml+='<div class="wordle-row" data-row="'+r+'">';
    for(let c=0;c<5;c++){
      gridHtml+='<div class="wordle-cell" data-row="'+r+'" data-col="'+c+'"></div>';
    }
    gridHtml+='</div>';
  }
  const KB_ROWS=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
  let kbHtml='';
  KB_ROWS.forEach((row,ri)=>{
    kbHtml+='<div class="wordle-kbrow">';
    if(ri===2)kbHtml+='<button class="wordle-key wordle-key-wide" data-key="ENTER">ENTER</button>';
    row.split('').forEach(ch=>{
      kbHtml+='<button class="wordle-key" data-key="'+ch+'">'+ch+'</button>';
    });
    if(ri===2)kbHtml+='<button class="wordle-key wordle-key-wide" data-key="BACK">⌫</button>';
    kbHtml+='</div>';
  });
  const html=card('green','🟩 WORDLE',
    '<div class="wordle-grid" id="'+gridId+'">'+gridHtml+'</div>'+
    '<div id="'+msgId+'" class="sub-info" style="text-align:center;min-height:14px;margin:6px 0">Guess the 5-letter word · 6 tries</div>'+
    '<div class="wordle-keyboard" id="'+keyId+'">'+kbHtml+'</div>',
    'Target from '+WORDLE_WORDS.length+' common words · guesses checked against a live dictionary'
  ,maybeWeirdBg(0.08));
  setTimeout(()=>{
    const gridEl=document.getElementById(gridId);
    const keyEl=document.getElementById(keyId);
    const msgEl=document.getElementById(msgId);
    if(!gridEl||!keyEl||!msgEl)return;
    let curRow=0,curGuess='',gameOver=false;
    function cellsForRow(r){
      return gridEl.querySelectorAll('[data-row="'+r+'"].wordle-cell');
    }
    function renderCurrent(){
      const cells=cellsForRow(curRow);
      cells.forEach((cell,i)=>{cell.textContent=curGuess[i]||'';});
    }
    function keyState(key){
      const btn=keyEl.querySelector('[data-key="'+key+'"]');
      return btn;
    }
    // Cache dictionary-API lookups for this game session so re-typing
    // the same not-quite-common word twice (or guessing a word that
    // turns out invalid) doesn't hit the network again.
    const dictCache=new Map();
    async function isRealWord(word){
      if(wordSet.has(word))return true;
      if(dictCache.has(word))return dictCache.get(word);
      const controller=new AbortController();
      const timer=setTimeout(()=>controller.abort(),5000);
      try{
        const res=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+word.toLowerCase(),{signal:controller.signal});
        // The API 404s for words it doesn't recognize and returns a
        // JSON array of entries for words it does — we only need to
        // know which case happened, not the definitions themselves.
        const valid=res.ok;
        dictCache.set(word,valid);
        return valid;
      }catch(err){
        console.warn('[widgetWordle] dictionary lookup failed, falling back to local list only:',err);
        // Network hiccup or API down — we can't confirm the word, but
        // rejecting it outright would be unfair for a word that might
        // be perfectly valid. Accept it rather than punish the player
        // for a connectivity issue outside their control.
        return true;
      }finally{
        clearTimeout(timer);
      }
    }
    let checking=false;
    async function submitGuess(){
      if(checking)return;
      if(curGuess.length<5){
        msgEl.textContent='Not enough letters';
        msgEl.style.color='#ef4444';
        return;
      }
      const guessSnapshot=curGuess;
      if(!wordSet.has(guessSnapshot)){
        checking=true;
        msgEl.textContent='Checking…';
        msgEl.style.color='var(--muted)';
        const valid=await isRealWord(guessSnapshot);
        checking=false;
        // The player could have kept typing/backspacing while the
        // lookup was in flight — only proceed if the guess on screen
        // still matches what we checked.
        if(curGuess!==guessSnapshot)return;
        if(!valid){
          msgEl.textContent='Not a real word';
          msgEl.style.color='#ef4444';
          return;
        }
      }
      const result=wordleScore(curGuess,target);
      const cells=cellsForRow(curRow);
      result.forEach((res,i)=>{
        const cell=cells[i];
        cell.classList.add('wordle-'+res);
        const k=keyState(curGuess[i]);
        if(k){
          // Don't downgrade a key that's already shown as a better state
          // (hit > present > miss) from an earlier guess this game.
          const rank={hit:3,present:2,miss:1};
          const curRank=rank[k.dataset.state]||0;
          if(rank[res]>curRank){
            k.dataset.state=res;
            k.className='wordle-key wordle-key-'+res+(k.classList.contains('wordle-key-wide')?' wordle-key-wide':'');
          }
        }
      });
      if(curGuess===target){
        msgEl.textContent='🎉 Solved in '+(curRow+1)+'/'+ROWS;
        msgEl.style.color='#22c55e';
        gameOver=true;
        return;
      }
      curRow++;
      curGuess='';
      if(curRow>=ROWS){
        msgEl.textContent='Out of guesses — it was '+target;
        msgEl.style.color='#f97316';
        gameOver=true;
      }else{
        msgEl.textContent='';
      }
    }
    function handleKey(key){
      if(gameOver||checking)return;
      if(key==='ENTER'){submitGuess();return;}
      if(key==='BACK'){curGuess=curGuess.slice(0,-1);renderCurrent();return;}
      if(/^[A-Z]$/.test(key)&&curGuess.length<5){
        curGuess+=key;
        renderCurrent();
      }
    }
    keyEl.addEventListener('click',(e)=>{
      const btn=e.target.closest('.wordle-key');
      if(!btn)return;
      handleKey(btn.dataset.key);
    });
    function physicalKeyHandler(e){
      // Only handle keys while this widget's card is still in the DOM —
      // avoids capturing keystrokes meant for other inputs (typing
      // challenge, etc.) once this widget has scrolled out or reset.
      // Also bail out entirely if focus is in a text input/textarea
      // elsewhere on the page, so this doesn't steal keystrokes from
      // the typing-challenge widget or any other text field.
      if(!document.body.contains(gridEl))return;
      const active=document.activeElement;
      if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'))return;
      if(e.key==='Enter'){handleKey('ENTER');}
      else if(e.key==='Backspace'){handleKey('BACK');}
      else if(/^[a-zA-Z]$/.test(e.key)){handleKey(e.key.toUpperCase());}
    }
    document.addEventListener('keydown',physicalKeyHandler);
  },100);
  return html;
}


/* ── LABYRINTH (interactive maze) ─────────────
   A randomly generated perfect maze (recursive-backtracker algorithm —
   every cell reachable, no loops, exactly one path between any two
   points) rendered as SVG walls. Navigate from the top-left entrance to
   the bottom-right exit with arrow keys or the on-screen D-pad. */
function generateMaze(cols,rows){
  const cells=[];
  for(let y=0;y<rows;y++){
    const row=[];
    for(let x=0;x<cols;x++){
      row.push({x,y,walls:{N:true,S:true,E:true,W:true},visited:false});
    }
    cells.push(row);
  }
  const opposite={N:'S',S:'N',E:'W',W:'E'};
  const dirs=[{d:'N',dx:0,dy:-1},{d:'S',dx:0,dy:1},{d:'E',dx:1,dy:0},{d:'W',dx:-1,dy:0}];
  const stack=[];
  let current=cells[0][0];
  current.visited=true;
  stack.push(current);
  while(stack.length>0){
    current=stack[stack.length-1];
    const neighbors=shuffle(dirs).map(({d,dx,dy})=>{
      const nx=current.x+dx,ny=current.y+dy;
      if(nx<0||nx>=cols||ny<0||ny>=rows)return null;
      const cell=cells[ny][nx];
      if(cell.visited)return null;
      return{d,cell};
    }).filter(Boolean);
    if(neighbors.length===0){stack.pop();continue;}
    const{d,cell}=neighbors[0];
    current.walls[d]=false;
    cell.walls[opposite[d]]=false;
    cell.visited=true;
    stack.push(cell);
  }
  return cells;
}
function mazeSVG(cells,cols,rows,cellSize,px,py){
  const W=cols*cellSize,H=rows*cellSize;
  let walls='';
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const c=cells[y][x];
      const x0=x*cellSize,y0=y*cellSize,x1=x0+cellSize,y1=y0+cellSize;
      if(c.walls.N)walls+='<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y0+'"/>';
      if(c.walls.W)walls+='<line x1="'+x0+'" y1="'+y0+'" x2="'+x0+'" y2="'+y1+'"/>';
      // Only draw S/E for the last row/col — interior S/E walls are
      // already drawn as a neighboring cell's N/W wall, avoids doubled lines.
      if(y===rows-1&&c.walls.S)walls+='<line x1="'+x0+'" y1="'+y1+'" x2="'+x1+'" y2="'+y1+'"/>';
      if(x===cols-1&&c.walls.E)walls+='<line x1="'+x1+'" y1="'+y0+'" x2="'+x1+'" y2="'+y1+'"/>';
    }
  }
  // Player marker is drawn as part of the same SVG (not a separately
  // positioned HTML overlay) so it always lines up with the maze
  // regardless of how the SVG itself gets scaled to fit the card width.
  const playerCx=px*cellSize+cellSize/2,playerCy=py*cellSize+cellSize/2;
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;background:rgba(255,255,255,0.02);border-radius:4px">'+
    '<g stroke="var(--border-bright,#7eb4ff)" stroke-width="2" stroke-linecap="round" fill="none">'+walls+'</g>'+
    '<rect x="2" y="2" width="'+(cellSize-4)+'" height="'+(cellSize-4)+'" fill="#22c55e" opacity="0.5" rx="2"/>'+
    '<rect x="'+((cols-1)*cellSize+2)+'" y="'+((rows-1)*cellSize+2)+'" width="'+(cellSize-4)+'" height="'+(cellSize-4)+'" fill="#ef4444" opacity="0.5" rx="2"/>'+
    '<circle cx="'+playerCx+'" cy="'+playerCy+'" r="'+(cellSize/2-3)+'" fill="#7eb4ff" style="transition:cx .1s,cy .1s"/>'+
  '</svg>';
}
function widgetLabyrinth(){
  const COLS=10,ROWS=10,CELL=22;
  const id='mz'+Math.random().toString(36).slice(2);
  const svgWrapId=id+'s',playerId=id+'p',msgId=id+'m',movesId=id+'c';
  const dpadId=id+'d';
  const cells=generateMaze(COLS,ROWS);
  let px=0,py=0,moves=0,won=false;
  const dpadHtml=
    '<div style="display:grid;grid-template-columns:repeat(3,32px);grid-template-rows:repeat(2,28px);gap:3px;justify-content:center;margin-top:8px">'+
      '<div></div><button class="wordle-key" data-dir="N" style="padding:4px">▲</button><div></div>'+
      '<button class="wordle-key" data-dir="W" style="padding:4px">◀</button>'+
      '<button class="wordle-key" data-dir="S" style="padding:4px">▼</button>'+
      '<button class="wordle-key" data-dir="E" style="padding:4px">▶</button>'+
    '</div>';
  const html=card('violet','🌀 LABYRINTH',
    '<div id="'+svgWrapId+'" style="position:relative"></div>'+
    '<div id="'+msgId+'" class="sub-info" style="text-align:center;margin-top:6px;min-height:14px">Reach the red exit · arrow keys or D-pad</div>'+
    '<div id="'+dpadId+'">'+dpadHtml+'</div>'+
    '<div class="sub-info" style="margin-top:8px">Moves: <span id="'+movesId+'">0</span></div>',
    COLS+'×'+ROWS+' cells · recursive backtracker, one unique path'
  ,maybeWeirdBg(0.1));
  setTimeout(()=>{
    const svgWrap=document.getElementById(svgWrapId);
    const msgEl=document.getElementById(msgId);
    const movesEl=document.getElementById(movesId);
    const dpadEl=document.getElementById(dpadId);
    if(!svgWrap||!msgEl||!movesEl||!dpadEl)return;
    function renderPlayer(){
      svgWrap.innerHTML=mazeSVG(cells,COLS,ROWS,CELL,px,py);
    }
    function move(dir){
      if(won)return;
      const c=cells[py][px];
      if(c.walls[dir])return; // blocked by a wall
      if(dir==='N')py--;
      if(dir==='S')py++;
      if(dir==='E')px++;
      if(dir==='W')px--;
      moves++;
      movesEl.textContent=moves;
      renderPlayer();
      if(px===COLS-1&&py===ROWS-1){
        won=true;
        msgEl.textContent='🎉 Escaped in '+moves+' moves!';
        msgEl.style.color='#22c55e';
      }
    }
    dpadEl.addEventListener('click',(e)=>{
      const btn=e.target.closest('[data-dir]');
      if(btn)move(btn.dataset.dir);
    });
    function keyHandler(e){
      if(!document.body.contains(svgWrap))return;
      const active=document.activeElement;
      if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'))return;
      const map={ArrowUp:'N',ArrowDown:'S',ArrowLeft:'W',ArrowRight:'E'};
      if(map[e.key]){
        e.preventDefault();
        move(map[e.key]);
      }
    }
    document.addEventListener('keydown',keyHandler);
    renderPlayer();
  },100);
  return html;
}


/* ── MINESWEEPER ──────────────────────────────
   Classic Minesweeper on a small grid. Mines are placed randomly but
   never on or adjacent to your first click (standard fairness rule —
   no first-move instant-loss with zero information). Left-click/tap
   reveals, right-click/long-press flags. Flood-fills connected zero-
   adjacency cells automatically, same as the original. */
function buildMineBoard(cols,rows,mineCount,safeX,safeY){
  const cells=[];
  for(let y=0;y<rows;y++){
    const row=[];
    for(let x=0;x<cols;x++)row.push({x,y,mine:false,revealed:false,flagged:false,adjacent:0});
    cells.push(row);
  }
  const isSafeZone=(x,y)=>Math.abs(x-safeX)<=1&&Math.abs(y-safeY)<=1;
  let placed=0,attempts=0;
  while(placed<mineCount&&attempts<10000){
    attempts++;
    const x=rnd(0,cols-1),y=rnd(0,rows-1);
    if(cells[y][x].mine||isSafeZone(x,y))continue;
    cells[y][x].mine=true;
    placed++;
  }
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(cells[y][x].mine)continue;
      let count=0;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        if(dx===0&&dy===0)continue;
        const nx=x+dx,ny=y+dy;
        if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&cells[ny][nx].mine)count++;
      }
      cells[y][x].adjacent=count;
    }
  }
  return cells;
}
function floodReveal(cells,cols,rows,x,y){
  const stack=[[x,y]];
  while(stack.length){
    const[cx,cy]=stack.pop();
    const c=cells[cy][cx];
    if(c.revealed||c.flagged)continue;
    c.revealed=true;
    if(c.adjacent===0&&!c.mine){
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        if(dx===0&&dy===0)continue;
        const nx=cx+dx,ny=cy+dy;
        if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!cells[ny][nx].revealed)stack.push([nx,ny]);
      }
    }
  }
}
const MINE_NUM_COLORS=['','#7eb4ff','#22c55e','#ef4444','#a78bfa','#f97316','#06b6d4','#e2e8f4','#94a3b8'];
function widgetMinesweeper(){
  const COLS=9,ROWS=9,MINES=10,CELL=26;
  const id='ms'+Math.random().toString(36).slice(2);
  const gridId=id+'g',msgId=id+'m',flagId=id+'f',mineId=id+'n';
  let cells=null; // built lazily on first click, so we know the safe zone
  let started=false,gameOver=false,won=false,flagsUsed=0;
  const totalSafe=COLS*ROWS-MINES;
  let revealedCount=0;
  let gridHtml='';
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      gridHtml+='<div class="mine-cell" data-x="'+x+'" data-y="'+y+'"></div>';
    }
  }
  const html=card('orange','💣 MINESWEEPER',
    '<div class="mine-grid" id="'+gridId+'" style="grid-template-columns:repeat('+COLS+','+CELL+'px)">'+gridHtml+'</div>'+
    '<div id="'+msgId+'" class="sub-info" style="text-align:center;margin-top:6px;min-height:14px">Click any cell to start · right-click to flag</div>'+
    '<div class="sub-info" style="margin-top:4px">Mines: '+MINES+' · Flags used: <span id="'+flagId+'">0</span></div>',
    COLS+'×'+ROWS+' grid · '+MINES+' mines · first click is always safe'
  ,maybeWeirdBg(0.1));
  setTimeout(()=>{
    const gridEl=document.getElementById(gridId);
    const msgEl=document.getElementById(msgId);
    const flagEl=document.getElementById(flagId);
    if(!gridEl||!msgEl||!flagEl)return;
    function cellEl(x,y){
      return gridEl.querySelector('[data-x="'+x+'"][data-y="'+y+'"]');
    }
    function renderAll(){
      for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
          const c=cells[y][x];
          const el=cellEl(x,y);
          el.className='mine-cell'+(c.revealed?' mine-revealed':'');
          if(c.revealed){
            if(c.mine){
              el.textContent='💣';
              el.classList.add('mine-boom');
            }else if(c.adjacent>0){
              el.textContent=c.adjacent;
              el.style.color=MINE_NUM_COLORS[c.adjacent];
            }else{
              el.textContent='';
            }
          }else if(c.flagged){
            el.textContent='🚩';
          }else{
            el.textContent='';
          }
        }
      }
    }
    function revealAllMines(){
      for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(cells[y][x].mine)cells[y][x].revealed=true;
    }
    function checkWin(){
      revealedCount=0;
      for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(cells[y][x].revealed&&!cells[y][x].mine)revealedCount++;
      if(revealedCount===totalSafe){
        gameOver=true;won=true;
        msgEl.textContent='🎉 Cleared the field!';
        msgEl.style.color='#22c55e';
      }
    }
    function reveal(x,y){
      if(gameOver)return;
      if(!started){
        // Board is generated only now, so mine placement can safely
        // exclude this exact first-clicked cell and its neighbors.
        cells=buildMineBoard(COLS,ROWS,MINES,x,y);
        started=true;
      }
      const c=cells[y][x];
      if(c.revealed||c.flagged)return;
      if(c.mine){
        c.revealed=true;
        gameOver=true;
        revealAllMines();
        renderAll();
        msgEl.textContent='💥 Boom — try the next one';
        msgEl.style.color='#ef4444';
        return;
      }
      floodReveal(cells,COLS,ROWS,x,y);
      renderAll();
      checkWin();
    }
    function toggleFlag(x,y){
      if(gameOver||!started)return;
      const c=cells[y][x];
      if(c.revealed)return;
      c.flagged=!c.flagged;
      flagsUsed+=c.flagged?1:-1;
      flagEl.textContent=flagsUsed;
      renderAll();
    }
    gridEl.addEventListener('click',(e)=>{
      const el=e.target.closest('.mine-cell');
      if(!el)return;
      reveal(+el.dataset.x,+el.dataset.y);
    });
    gridEl.addEventListener('contextmenu',(e)=>{
      const el=e.target.closest('.mine-cell');
      if(!el)return;
      e.preventDefault();
      toggleFlag(+el.dataset.x,+el.dataset.y);
    });
    // Long-press to flag on touch devices, where there's no right-click.
    // Three things have to work together for this to be reliable:
    //  1. CSS touch-action/-webkit-touch-callout (set on .mine-cell)
    //     stops the browser's own long-press text-selection/callout from
    //     hijacking the gesture before our timer even fires.
    //  2. touchmove cancels the pending flag if the finger drifts off
    //     the cell it started on (a finger is never perfectly still,
    //     and a real drag/scroll shouldn't register as a long-press).
    //  3. Touch interactions fire a synthetic 'click' right after
    //     touchend, so without suppressing it, a long-press-to-flag
    //     would also reveal the same cell a moment later — guarded with
    //     a flag and preventDefault on touchend.
    let pressTimer=null,longPressed=false,pressEl=null;
    function clearPress(){
      if(pressTimer)clearTimeout(pressTimer);
      pressTimer=null;
      pressEl=null;
    }
    gridEl.addEventListener('touchstart',(e)=>{
      const el=e.target.closest('.mine-cell');
      if(!el)return;
      longPressed=false;
      pressEl=el;
      pressTimer=setTimeout(()=>{
        longPressed=true;
        toggleFlag(+el.dataset.x,+el.dataset.y);
        pressTimer=null;
      },500);
    },{passive:true});
    gridEl.addEventListener('touchmove',(e)=>{
      const el=e.target.closest('.mine-cell');
      if(el!==pressEl)clearPress();
    },{passive:true});
    gridEl.addEventListener('touchend',(e)=>{
      clearPress();
      if(longPressed)e.preventDefault();
    });
    gridEl.addEventListener('touchcancel',clearPress);
  },100);
  return html;
}

  function buildFontAwesomeFavicon(){
    const useBrand=Math.random()<0.2;
    const set=useBrand?FA_BRANDS:FA_SOLID;
    const code=set[Math.floor(Math.random()*set.length)];
    const glyph=String.fromCharCode(parseInt(code,16));
    const fontFamily=useBrand?'"Font Awesome 6 Brands"':'"Font Awesome 6 Free"';
    const fontWeight=useBrand?'400':'900';

    const canvas=document.createElement('canvas');
    canvas.width=64;canvas.height=64;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,64,64);
    ctx.fillStyle='#080c14';
    ctx.beginPath();ctx.roundRect?ctx.roundRect(0,0,64,64,12):ctx.rect(0,0,64,64);ctx.fill();
    ctx.font=fontWeight+' 38px '+fontFamily;
    ctx.fillStyle='#7eb4ff';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(glyph,32,34);

    let link=document.querySelector('link[rel="icon"]');
    if(!link){link=document.createElement('link');link.rel='icon';document.head.appendChild(link)}
    link.type='image/png';
    link.href=canvas.toDataURL('image/png');
  }

  // Load Font Awesome 6 Free webfont, then draw the favicon once it's ready.
  // Guarded so the icon is only ever drawn ONCE — otherwise the fallback
  // timer and the font-ready path can both fire and the icon visibly
  // changes a split second after load.
  let faviconDrawn=false;
  function drawOnce(){
    if(faviconDrawn)return;
    faviconDrawn=true;
    buildFontAwesomeFavicon();
  }

  const faLink=document.createElement('link');
  faLink.rel='stylesheet';
  faLink.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css';

      document.fonts.load('900 38px "Font Awesome 6 Free"').then(function(){
        document.fonts.load('400 38px "Font Awesome 6 Brands"').then(drawOnce);
      }).catch(drawOnce);
    };
    faLink.onerror=drawOnce;
    // Fallback in case fonts API or onload doesn't fire promptly —
    // drawOnce() ensures this can't cause a second, different icon.
    setTimeout(drawOnce,800);
  }else{
    setTimeout(drawOnce,500);
  }
