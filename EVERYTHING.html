<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVERY.THING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c14;
    --surface: #0d1220;
    --border: rgba(100,140,220,0.15);
    --border-bright: rgba(100,160,255,0.3);
    --text: #e2e8f4;
    --muted: #5a6a8a;
    --mono: 'Space Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header h1 {
    font-family: var(--mono);
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    letter-spacing: 0.35em;
    color: #fff;
  }

  header p {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 6px;
    font-family: var(--mono);
    text-transform: uppercase;
  }

  .reload-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 7px 18px;
    background: transparent;
    border: 1px solid var(--border-bright);
    color: #7eb4ff;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.2s, color 0.2s;
    text-transform: uppercase;
  }
  .reload-btn:hover { background: rgba(100,160,255,0.08); color: #aad0ff; }
  .reload-btn svg { width: 13px; height: 13px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 22px 22px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.3s;
    min-height: 180px;
  }
  .card:hover { border-color: var(--border-bright); }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 6px 6px 0 0;
  }

  .card.accent-blue::before  { background: #3b82f6; }
  .card.accent-teal::before  { background: #14b8a6; }
  .card.accent-amber::before { background: #f59e0b; }
  .card.accent-pink::before  { background: #ec4899; }
  .card.accent-green::before { background: #22c55e; }
  .card.accent-violet::before { background: #8b5cf6; }
  .card.accent-red::before   { background: #ef4444; }
  .card.accent-cyan::before  { background: #06b6d4; }

  .card-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-label .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .card-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .big-value {
    font-family: var(--mono);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    line-height: 1;
    color: #fff;
  }

  .big-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.4;
  }

  .sub-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .card-footer {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    padding-top: 10px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.08em;
  }

  /* Weather icon */
  .weather-icon {
    font-size: 2.4rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  /* Rubik cube */
  .cube-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    width: 90px;
  }
  .cube-face {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .cube-sticker {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 2px;
  }
  .cube-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .cube-face-wrap { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .cube-face-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }

  /* Country flag */
  .flag-big { font-size: 3rem; line-height: 1; }

  /* Loading state */
  .loading {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    animation: pulse 1.2s infinite;
    letter-spacing: 0.1em;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .fact-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 10px;
    border-radius: 3px;
    border: 1px solid var(--border-bright);
    color: #7eb4ff;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }

  /* Two-column tall card */
  .card.tall { grid-row: span 2; }

  /* countdown numbers */
  .countdown-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .countdown-num {
    font-family: var(--mono);
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .countdown-lbl { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }

  /* bar chart for law */
  .bar-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .bar-label { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 28px; text-align: right; }

  .constellation-svg text { fill: var(--muted); }

  /* Rubik scramble notation */
  .scramble { font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.8; letter-spacing: 0.05em; }
  .scramble span { color: #7eb4ff; font-weight: 700; }

  .hello-big { font-family: var(--mono); font-size: 2rem; font-weight: 700; color: #fff; }

  /* Live clock tick */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .colon { animation: blink 1s step-start infinite; }
</style>

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { return [...arr].sort(() => Math.random()-0.5); }

function card(accent, label, html, footer='') {
  return `<div class="card accent-${accent}">
    <div class="card-label"><span class="dot"></span>${label}</div>
    <div class="card-main">${html}</div>
    ${footer ? `<div class="card-footer">${footer}</div>` : ''}
  </div>`;
}

function widgetTime() {
  const place = pick(TIMEZONES);
  const now = new Date();
  const fmt = new Intl.DateTimeFormat('en-GB', { timeZone: place.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
  const parts = fmt.formatToParts(now);
  const h = parts.find(p=>p.type==='hour').value;
  const m = parts.find(p=>p.type==='minute').value;
  const s = parts.find(p=>p.type==='second').value;

  const fmtDate = new Intl.DateTimeFormat('en-GB', { timeZone: place.tz, weekday: 'long', day: 'numeric', month: 'short' });

  const id = 'clock_s_' + Math.random().toString(36).slice(2);
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el) return;
    setInterval(() => {
      const n = new Date();
      const p2 = fmt.formatToParts(n);
      el.textContent = p2.find(x=>x.type==='second').value;
    }, 1000);
  }, 100);

  return card('blue', '⏱ LOCAL TIME',
    `<div class="big-value">${h}<span class="colon">:</span>${m}<span style="font-size:1.4rem;color:var(--muted)">:<span id="${id}">${s}</span></span></div>
     <div class="big-label">${place.flag} ${place.city}, ${place.country}</div>
     <div class="sub-info">${fmtDate.format(now)}</div>`,
    'Live clock — local solar time'
  );
}

    `${city.name}, ${city.country}`
  );

  const icons = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌊',71:'🌨',73:'🌨',80:'🌦',81:'🌧',95:'⛈',99:'⛈'};
  const descs = {0:'Clear skies',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Snow',73:'Heavy snow',80:'Rain showers',81:'Heavy showers',95:'Thunderstorm',99:'Thunderstorm + hail'};

  setTimeout(async () => {
    try {
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true&hourly=relative_humidity_2m&timezone=auto`);
      const d = await r.json();
      const cw = d.current_weather;
      const code = cw.weathercode;
      const icon = icons[code] || '🌡';
      const desc = descs[code] || 'Unknown';
      const windDir = ['N','NE','E','SE','S','SW','W','NW'][Math.round(cw.winddirection/45)%8];
      div.innerHTML = card('teal', '🌡 WEATHER SOMEWHERE',
        `<div class="weather-icon">${icon}</div>
         <div class="big-value">${Math.round(cw.temperature)}°C</div>
         <div class="big-label">${city.flag||'📍'} ${city.name}, ${city.country}</div>
         <div class="sub-info">${desc} · Wind ${Math.round(cw.windspeed)} km/h ${windDir}</div>`,
        `Data: Open-Meteo · WMO code ${code}`
      );
    } catch {
      div.innerHTML = card('teal','🌡 WEATHER SOMEWHERE',
        `<div class="big-label">Could not reach weather API</div><div class="sub-info">Try reloading</div>`,
        city.name + ', ' + city.country
      );
    }
  }, 50);
  return div;
}

function generateScramble() {
  const moves = [];
  let last = '';
  for (let i = 0; i < 20; i++) {
    let m;
    do { m = pick(SCRAMBLE_MOVES); } while (m[0] === last);
    last = m[0];
    moves.push(m);
  }
  return moves;
}

function randomCubeFace(seed) {
  const colors = ['W','Y','R','O','B','G'];
  const face = [];
  for (let i = 0; i < 9; i++) face.push(colors[(seed + i * 3) % 6]);
  face[4] = colors[seed % 6];
  return face;
}

function renderFace(stickers, label) {
  const cells = stickers.map(c =>
    `<div class="cube-sticker" style="background:${CUBE_COLORS[c]}"></div>`
  ).join('');
  return `<div class="cube-face-wrap">
    <div class="cube-face">${cells}</div>
    <div class="cube-face-label">${label}</div>
  </div>`;
}

function widgetRubik() {
  const seed = Math.floor(Math.random() * 100);
  const faces = ['U','F','R'].map((l, i) => renderFace(randomCubeFace((seed + i * 17) % 6), l));
  const scramble = generateScramble();
  const scrambleHtml = scramble.map(m =>
    `<span style="color:${m.includes("'")?'#f97316':m.includes('2')?'#a78bfa':'#7eb4ff'}">${m}</span>`
  ).join(' ');

  return card('violet', '🧩 RUBIK\'S CUBE PATTERN',
    `<div class="cube-layout">${faces.join('')}</div>
     <div class="scramble" style="margin-top:10px">Scramble: ${scrambleHtml}</div>`,
    'Random state · 3 of 6 faces shown'
  );
}

function widgetLaw() {
  const law = pick(WEIRD_LAWS);
  const absurdity = Math.floor(Math.random() * 60) + 40;
  return card('amber', '⚖️ WEIRD LAW',
    `<div class="fact-text">"${law.law}"</div>
     <div class="tag">${law.country}</div>
     <div style="margin-top:14px">
       <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.15em;margin-bottom:4px">ABSURDITY RATING</div>
       <div class="bar-row">
         <div class="bar-track"><div class="bar-fill" style="width:${absurdity}%;background:#f59e0b"></div></div>
         <div class="bar-label">${absurdity}%</div>
       </div>
     </div>`,
    'Still technically on the books'
  );
}

function widgetCountry() {
  const c = pick(COUNTRIES);
  return card('coral', '🌍 RANDOM COUNTRY',
    `<div class="flag-big">${c.flag}</div>
     <div class="big-value" style="font-size:1.6rem;margin-top:6px">${c.name}</div>
     <div class="big-label" style="margin-top:4px">Capital: ${c.capital}</div>
     <div class="sub-info">Population: ${c.pop}</div>
     <div class="fact-text" style="margin-top:8px;font-size:12px;color:var(--muted)">${c.fact}</div>`,
    'One of 195 countries · reload for another'
  );
}

function widgetGreeting() {
  const g = pick(GREETINGS);
  return card('green', '👋 HELLO IN ANOTHER LANGUAGE',
    `<div class="hello-big">${g.word}</div>
     <div style="font-family:var(--mono);font-size:1rem;color:var(--muted);margin-top:4px">${g.roman !== g.word ? g.roman : ''}</div>
     <div class="tag">${g.flag} ${g.lang}</div>`,
    'Say it out loud'
  );
}

function widgetRecord() {
  const r = pick(RECORDS);
  return card('pink', '🏆 WORLD RECORD',
    `<div class="big-value" style="font-size:1.8rem">${r.value}</div>
     <div class="big-label" style="margin-top:6px">${r.record}</div>
     <div class="sub-info" style="margin-top:4px">${r.holder}</div>
     <div class="tag">${r.unit}</div>`,
    'Guinness World Records'
  );
}

function widgetHoliday() {
  const now = new Date();
  const upcoming = HOLIDAYS
    .map(h => {
      let d = new Date(h.date);
      if (d < now) d.setFullYear(d.getFullYear()+1);
      const diff = Math.ceil((d - now) / (1000*60*60*24));
      return { ...h, date: d, diff };
    })
    .sort((a,b) => a.diff - b.diff);

  const h = pick(upcoming.slice(0, 4));
  const days = h.diff;
  const weeks = Math.floor(days / 7);
  const rem = days % 7;

  return card('cyan', '📅 DAYS UNTIL…',
    `<div class="big-value">${days}</div>
     <div class="big-label" style="margin-top:6px">${h.name}</div>
     <div class="sub-info">${h.date.toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}</div>
     <div class="sub-info" style="margin-top:4px">${weeks}w ${rem}d away</div>`,
    'Calendar is a social construct'
  );
}

function widgetConstellation() {
  const c = pick(CONSTELLATIONS);
  const W = 240, H = 200;
  const allX = c.stars.map(s=>s[0]);
  const allY = c.stars.map(s=>s[1]);
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const minY = Math.min(...allY), maxY = Math.max(...allY);
  const scaleX = (W-40)/(maxX-minX||1);
  const scaleY = (H-40)/(maxY-minY||1);
  const scale = Math.min(scaleX, scaleY);
  const ox = (W - (maxX-minX)*scale)/2 - minX*scale;
  const oy = (H - (maxY-minY)*scale)/2 - minY*scale;
  const pts = c.stars.map(([x,y]) => [x*scale+ox, y*scale+oy]);

  const lines = c.lines.map(([a,b]) =>
    `<line x1="${pts[a][0]}" y1="${pts[a][1]}" x2="${pts[b][0]}" y2="${pts[b][1]}" stroke="rgba(100,160,255,0.2)" stroke-width="1"/>`
  ).join('');
  const stars = pts.map(([x,y],i) =>
    `<circle cx="${x}" cy="${y}" r="${i===0?4:2.5}" fill="${i===0?'#7eb4ff':'#a5c4fa'}" opacity="0.9"/>`
  ).join('');

  const bg = Array.from({length:40}, () => {
    const bx = Math.random()*W, by = Math.random()*H;
    const op = (0.1+Math.random()*0.25).toFixed(2);
    return `<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="0.8" fill="#ffffff" opacity="${op}"/>`;
  }).join('');

  return card('blue', '✨ CONSTELLATION',
    `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="max-width:100%;display:block">
      ${bg}${lines}${stars}
    </svg>
    <div class="big-label" style="text-align:center">${c.name}</div>`,
    'Northern hemisphere, not to scale'
  );
}

const ALL_WIDGETS = [
  widgetTime,
  widgetWeather,
  widgetRubik,
  widgetLaw,
  widgetCountry,
  widgetGreeting,
  widgetRecord,
  widgetHoliday,
  widgetConstellation,
];

function init() {
  const ts = document.getElementById('ts');
  ts.textContent = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' local';

  const chosen = shuffle(ALL_WIDGETS).slice(0, 6);
  const accents = shuffle(ACCENTS);
  const grid = document.getElementById('grid');

  chosen.forEach((fn, i) => {
    const result = fn(accents[i]);
    if (typeof result === 'string') {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = result;
      grid.appendChild(wrapper.firstElementChild);
    } else {
      grid.appendChild(result);
    }
  });
}

init();
</script>
</body>
</html>
