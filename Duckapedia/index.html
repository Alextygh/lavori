<!DOCTYPE html>
<html lang="en">
<head>

  <title>Duckapedia</title>
  <link rel="icon" type="image/x-icon" href="https://static.wikia.nocookie.net/hitman/images/3/37/Rubberduckymodel.PNG/revision/latest?cb=20200329154620">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #1a1a1a;
      color: #c6c6c6;
      line-height: 1.6;
    }

    nav {
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 48px;
    }
    nav .site-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      white-space: nowrap;
      text-decoration: none;
    }
    nav .site-name:hover { color: #c3000d; }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    h1.page-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid #c3000d;
      padding-bottom: 8px;
      margin-bottom: 6px;
    }
    .page-subtitle {
      color: #777;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    h2.section-heading {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid #444;
      padding-bottom: 4px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      padding: 12px 14px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-group label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .filter-select {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #ccc;
      font-size: 0.8rem;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
      min-width: 130px;
    }
    .filter-select:hover { border-color: #555; }
    .filter-select:focus { border-color: #c3000d; }

    .filter-divider {
      width: 1px;
      height: 24px;
      background: #333;
      margin: 0 2px;
    }

    .filter-reset {
      margin-left: auto;
      background: none;
      border: 1px solid #3a3a3a;
      color: #888;
      font-size: 0.75rem;
      padding: 4px 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .filter-reset:hover { border-color: #c3000d; color: #fff; }

    /* RESULTS COUNT */
    .results-info {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 14px;
    }

    /* DUCK GRID */
    .duck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    /* DUCK CARD */
    .duck-card {
      background: #242424;
      border: 1px solid #333;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s;
      position: relative;
    }
    .duck-card:hover { border-color: #c3000d; }
    .duck-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #2e2e2e;
      display: block;
    }
    .duck-card .card-label {
      padding: 8px 10px;
      border-top: 1px solid #333;
      font-size: 0.82rem;
      color: #ddd;
      text-align: center;
    }

    /* TIME LIMITED BADGE */
    .badge-time-limited {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: #c3000d;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 6px;
      text-align: center;
      line-height: 1.4;
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 0;
      color: #555;
      font-size: 0.9rem;
    }

    footer {
      border-top: 1px solid #2a2a2a;
      margin-top: 64px;
      padding-top: 20px;
      color: #555;
      font-size: 0.78rem;
      text-align: center;
    }
  </style>
</head>

  const grid       = document.getElementById('duck-grid');
  const info       = document.getElementById('results-info');
  const fSort      = document.getElementById('f-sort');
  const fType      = document.getElementById('f-type');
  const fLethal    = document.getElementById('f-lethal');
  const fAvail     = document.getElementById('f-avail');
  const btnReset   = document.getElementById('btn-reset');

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  function daysUntil(isoDate) {
    if (!isoDate) return Infinity;
    const d = new Date(isoDate);
    d.setHours(0, 0, 0, 0);
    return Math.ceil((d - today) / 86400000);
  }

  function formatExpiry(isoDate) {
    if (!isoDate) return '';
    const d = new Date(isoDate);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function render() {
    const sortVal   = fSort.value;
    const typeVal   = fType.value;
    const lethalVal = fLethal.value;
    const availVal  = fAvail.value;

    let list = DUCKS.filter(d => {
      if (typeVal   && d.type         !== typeVal)   return false;
      if (lethalVal && d.lethal       !== lethalVal) return false;
      if (availVal  && d.availability !== availVal)  return false;
      return true;
    });

    list.sort((a, b) => {
      if (sortVal === 'time-first') {
        const aIsT = a.availability === 'Time Limited';
        const bIsT = b.availability === 'Time Limited';
        if (aIsT && !bIsT) return -1;
        if (!aIsT && bIsT) return  1;
        if (aIsT && bIsT) return daysUntil(a.expires) - daysUntil(b.expires);
        return a.name.localeCompare(b.name);
      }
      if (sortVal === 'az') return a.name.localeCompare(b.name);
      if (sortVal === 'za') return b.name.localeCompare(a.name);
      return 0;
    });

    grid.innerHTML = '';

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-state">No ducks match the current filters.</div>';
      info.textContent = 'Showing 0 ducks';
      return;
    }

    info.textContent = `Showing ${list.length} of ${DUCKS.length} duck${DUCKS.length !== 1 ? 's' : ''}`;

    list.forEach(duck => {
      const a = document.createElement('a');
      a.className = 'duck-card';
      a.href = duck.href;

      const isTimeLimited = duck.availability === 'Time Limited';
      const days = isTimeLimited ? daysUntil(duck.expires) : Infinity;
      const expLabel = isTimeLimited ? formatExpiry(duck.expires) : '';

      a.innerHTML = `
        ${isTimeLimited ? `<div class="badge-time-limited">TIME LIMITED${expLabel ? ' · ' + expLabel : ''}</div>` : ''}
        <img src="${duck.img}" alt="${duck.name}" ${isTimeLimited ? 'style="padding-top:22px"' : ''} />
        <div class="card-label">${duck.name}</div>
      `;

      grid.appendChild(a);
    });
  }

  [fSort, fType, fLethal, fAvail].forEach(el => el.addEventListener('change', render));

  btnReset.addEventListener('click', () => {
    fSort.value   = 'time-first';
    fType.value   = '';
    fLethal.value = '';
    fAvail.value  = '';
    render();
  });

  render();
