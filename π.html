<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/a/a6/Top_down_view_of_peach_pie_%28722379748%29.jpg">
<title>π</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #d8d8d8;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 18px;
    line-height: 1.85;
    overflow-x: hidden;
  }

  #viewport {
    padding: 48px 44px 48px;
    max-width: 940px;
    margin: 0 auto;
  }

  /* Single continuous text block — no chunk breaks */
  #pitext {
    word-break: break-all;
    letter-spacing: 0.3px;
  }

  .d {
    cursor: default;
    border-radius: 2px;
    transition: background 0.08s;
  }

  .d:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  .d.active {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }

  #tip {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #0e0e0e;
    border: 1px solid #2a2a2a;
    color: #aaa;
    font-size: 13px;
    font-family: Georgia, serif;
    letter-spacing: 0.04em;
    padding: 7px 20px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s, transform 0.18s;
    white-space: nowrap;
    z-index: 100;
  }

  #tip.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #sentinel {
    height: 1px;
    width: 100%;
  }
</style>
</head>
<body>

<div id="viewport">
  <div id="pitext"></div>
</div>
<div id="sentinel"></div>
<div id="tip"></div>

<script>
// ─── Web Worker (inlined) ──────────────────────────────────────────────────
const WORKER_SRC = `
function arctan(x, prec) {
  const xn = BigInt(x);
  let sum = prec / xn;
  let term = prec / xn;
  let n = 1n;
  let sign = -1n;
  while (true) {
    n += 2n;
    term = term / (xn * xn);
    const next = term / n;
    if (next === 0n) break;
    sum += sign * next;
    sign = -sign;
  }
  return sum;
}

let computed = '';
let upTo = 0;

function ensureDigits(need) {
  if (need <= upTo) return;
  const target = need + 500;
  const PREC = 10n ** BigInt(target + 20);
  const pi = 4n * (4n * arctan(5, PREC) - arctan(239, PREC));
  const s = pi.toString();
  computed = s.slice(1); // drop leading '3', keep decimal digits
  upTo = target;
}

self.onmessage = function(e) {
  const { from, to } = e.data;
  ensureDigits(to);
  const chunk = computed.slice(from - 1, to);
  self.postMessage({ from, digits: chunk });
};
`;

const worker = new Worker(
  URL.createObjectURL(new Blob([WORKER_SRC], { type: 'application/javascript' }))
);

// ─── State ─────────────────────────────────────────────────────────────────
const CHUNK_SIZE = 400;
const PRELOAD    = 4;

let nextChunkStart = 1;
let pending        = 0;
let activeSpan     = null;

const pitext   = document.getElementById('pitext');
const sentinel = document.getElementById('sentinel');
const tip      = document.getElementById('tip');

// ─── Ordinal ───────────────────────────────────────────────────────────────
function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// ─── Tooltip ───────────────────────────────────────────────────────────────
let tipTimer = null;
function showTip(text) {
  clearTimeout(tipTimer);
  tip.textContent = text;
  tip.classList.add('show');
  tipTimer = setTimeout(() => tip.classList.remove('show'), 2800);
}

// ─── Click (delegated) ────────────────────────────────────────────────────
pitext.addEventListener('click', e => {
  const span = e.target.closest('.d');
  if (activeSpan) activeSpan.classList.remove('active');
  if (!span) { activeSpan = null; tip.classList.remove('show'); return; }
  activeSpan = span;
  span.classList.add('active');
  const pos = parseInt(span.dataset.p, 10);
  showTip(pos === 0 ? 'integer part (3)' : ordinal(pos) + ' decimal digit');
});

document.addEventListener('click', e => {
  if (!e.target.closest('#viewport')) {
    if (activeSpan) { activeSpan.classList.remove('active'); activeSpan = null; }
    tip.classList.remove('show');
  }
});

// ─── Render ────────────────────────────────────────────────────────────────
worker.onmessage = e => {
  const { from, digits } = e.data;
  const frag = document.createDocumentFragment();

  // On very first chunk, prepend "3."
  if (from === 1) {
    const s = document.createElement('span');
    s.className = 'd';
    s.dataset.p = '0';
    s.textContent = '3.';
    frag.appendChild(s);
  }

  for (let i = 0; i < digits.length; i++) {
    const s = document.createElement('span');
    s.className = 'd';
    s.dataset.p = String(from + i);
    s.textContent = digits[i];
    frag.appendChild(s);
  }

  // Append directly into the single #pitext — no wrapping element
  pitext.appendChild(frag);
  pending--;
  maybeRequest();
};

// ─── Request ───────────────────────────────────────────────────────────────
function requestChunk() {
  const from = nextChunkStart;
  const to   = from + CHUNK_SIZE - 1;
  nextChunkStart = to + 1;
  pending++;
  worker.postMessage({ from, to });
}

function maybeRequest() {
  while (pending < PRELOAD) requestChunk();
}

// ─── Sentinel observer ────────────────────────────────────────────────────
new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) maybeRequest();
}, { rootMargin: '1000px' }).observe(sentinel);

// ─── Boot ──────────────────────────────────────────────────────────────────
maybeRequest();
</script>
</body>
</html>
