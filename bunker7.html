<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUNKER-7</title>
<style>
/* ===== FONT (inline, no Google Fonts import) ===== */
@font-face {
  font-family: 'Mono';
  src: local('Courier New'), local('Courier');
}

/* ===== VARIABLES ===== */
:root {
  --green:      #39ff14;
  --green-dim:  #4a7a4a;
  --green-dark: #1a3d1a;
  --green-bg:   #0b150b;
  --bg:         #050a05;
  --orange:     #ff6600;
  --red:        #ff3232;
  --blue:       #00bfff;
  --yellow:     #ffb300;
  --font:       'Courier New', Courier, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #020402;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: var(--font);
}

/* ===== MAIN FRAME ===== */
#G {
  font-family: var(--font);
  background: var(--bg);
  color: var(--green);
  width: 900px;
  height: 640px;
  border: 1px solid var(--green-dark);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(57,255,20,0.08), 0 0 80px rgba(57,255,20,0.04);
}

/* Scanline overlay */
#G::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  pointer-events: none;
  z-index: 999;
}

/* Corner brackets */
.corner { position: absolute; width: 14px; height: 14px; border-color: var(--green-dim); border-style: solid; opacity: 0.4; z-index: 1000; }
.corner.tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
.corner.tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
.corner.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
.corner.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

/* ===== HEADER ===== */
#hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: var(--green-bg);
  border-bottom: 1px solid var(--green-dark);
  flex-shrink: 0;
}
.ht { font-size: 16px; letter-spacing: 4px; }
.hstats { display: flex; gap: 20px; align-items: center; }
.stat-block { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.stat-lbl { font-size: 8px; color: var(--green-dim); letter-spacing: 1px; }
.stat-val { color: var(--green); font-size: 14px; }

/* ===== BODY LAYOUT ===== */
#body { display: grid; grid-template-columns: 1fr 280px; flex: 1; min-height: 0; }
#left  { display: flex; flex-direction: column; padding: 10px; gap: 8px; overflow: hidden; border-right: 1px solid var(--green-dark); }
#right { background: var(--green-bg); padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }

.slbl { font-size: 9px; letter-spacing: 3px; color: var(--green-dim); margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px solid var(--green-dark); }

/* ===== RESIDENTS ===== */
#res-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.res {
  background: var(--green-bg);
  border: 1px solid var(--green-dark);
  padding: 8px 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
}
.res:hover   { border-color: var(--green); transform: translateY(-1px); }
.res.alert   { border-color: var(--orange); animation: pulse-orange 0.7s infinite; }
.res.dead    { opacity: 0.2; cursor: default; border-color: #222; }
.res.mgon    { border-color: var(--blue); animation: pulse-blue 0.5s infinite; cursor: pointer; }
.res.flash-hurt { animation: hurt-flash 0.4s ease-out !important; }

@keyframes pulse-orange { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px 3px rgba(255,102,0,0.4)} }
@keyframes pulse-blue   { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px 3px rgba(0,191,255,0.4)} }
@keyframes hurt-flash   { 0%{background:#3a0000;border-color:#ff3232} 100%{background:var(--green-bg);border-color:var(--green-dark)} }

.rn  { font-size: 10px; color: var(--green); font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.rr  { font-size: 8px; color: var(--green-dim); margin-bottom: 4px; }
.rhb { height: 4px; background: #111; border-radius: 2px; overflow: hidden; margin-bottom: 3px; }
.rhf { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.4s; }
.rst { font-size: 8px; color: var(--green-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-face { font-size: 18px; line-height: 1; text-align: center; margin-bottom: 2px; }
.res.dead .res-face { filter: grayscale(1) brightness(0.3); }

/* ===== SYSTEMS ===== */
#sys-grid { display: flex; flex-direction: column; gap: 5px; }
.sr  { display: flex; align-items: center; gap: 8px; }
.sn  { width: 72px; color: var(--green-dim); font-size: 9px; letter-spacing: 1px; }
.sb  { flex: 1; height: 7px; background: #111; border-radius: 3px; overflow: hidden; }
.sf  { height: 100%; border-radius: 3px; transition: width 0.5s, background 0.4s; }
.sv  { width: 36px; text-align: right; font-size: 10px; font-weight: bold; }

/* ===== LOG ===== */
#log {
  flex: 1; min-height: 80px; max-height: 110px;
  background: var(--green-bg);
  border: 1px solid var(--green-dark);
  padding: 6px 8px;
  overflow: hidden;
  display: flex; flex-direction: column; gap: 2px;
}
.ll { font-size: 9px; color: var(--green-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 1px 0 1px 7px; border-left: 2px solid transparent; flex-shrink: 0; }
.ll.w { color: var(--orange); border-left-color: var(--orange); }
.ll.c { color: var(--red);    border-left-color: var(--red);    }
.ll.g { color: var(--green);  border-left-color: var(--green);  }

/* ===== RADIO CHATTER ===== */
#radio-wrap { flex-shrink: 0; }
#radio { background: var(--green-bg); border: 1px solid var(--green-dark); height: 56px; overflow: hidden; position: relative; }
#radio-inner { position: absolute; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; gap: 2px; padding: 4px 8px; }
.rl      { font-size: 8px; color: #2a5a2a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 1px; padding: 1px 0; }
.rl.new  { color: var(--green-dim); }

/* ===== CRISES PANEL ===== */
#qlist { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 6px; }
#qlist::-webkit-scrollbar { width: 3px; }
#qlist::-webkit-scrollbar-thumb { background: var(--green-dark); }

.q      { background: #0a120a; border: 1px solid var(--green-dark); padding: 10px; border-radius: 4px; flex-shrink: 0; }
.q.urg  { border-color: var(--red);    animation: pulse-red    0.6s infinite; }
.q.warn { border-color: var(--orange); animation: pulse-orange 0.9s infinite; }

@keyframes pulse-red { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px 3px rgba(255,50,50,0.3)} }

.qh  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.qt  { font-size: 11px; color: var(--green); letter-spacing: 1px; font-weight: bold; }
.qtm { font-size: 12px; font-weight: bold; }
.qd  { font-size: 9px; color: var(--green-dim); margin-bottom: 6px; line-height: 1.4; }
.qpb { height: 4px; background: #111; border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
.qpf { height: 100%; border-radius: 2px; transition: width 0.2s; }
.qa  { display: flex; gap: 4px; flex-wrap: wrap; }
.qb  {
  background: transparent;
  border: 1px solid var(--green-dark);
  color: var(--green);
  font-family: var(--font);
  font-size: 10px;
  padding: 6px;
  cursor: pointer;
  border-radius: 3px;
  letter-spacing: 1px;
  transition: all 0.15s;
  flex: 1;
  min-width: 60px;
  text-align: center;
}
.qb:hover { background: var(--green-dark); border-color: var(--green); }

#nq { font-size: 11px; color: var(--green-dim); text-align: center; padding: 30px 10px; letter-spacing: 2px; }
#paused-note { font-size: 9px; color: var(--blue); text-align: center; padding: 5px; letter-spacing: 2px; display: none; border: 1px solid rgba(0,191,255,0.4); border-radius: 3px; animation: pulse-blue 1s infinite; }

/* ===== MINIGAME OVERLAY ===== */
#overlay { position: absolute; inset: 0; background: rgba(2,6,2,0.96); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
#overlay.show { display: flex; }
#mg-wrap { background: var(--green-bg); border: 2px solid var(--blue); padding: 18px; border-radius: 6px; width: 340px; box-shadow: 0 0 20px rgba(0,191,255,0.2); }
#mg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
#mg-title  { font-size: 13px; letter-spacing: 2px; color: var(--blue); flex: 1; }
#mg-back   { background: transparent; border: 1px solid var(--orange); color: var(--orange); font-family: var(--font); font-size: 9px; padding: 5px 12px; cursor: pointer; border-radius: 3px; letter-spacing: 1px; }
#mg-back:hover { background: #3d1a00; color: var(--yellow); }
#mg-sub    { font-size: 10px; color: var(--green-dim); margin-bottom: 8px; line-height: 1.4; }
#mg-timer  { font-size: 12px; color: var(--red); margin-bottom: 6px; text-align: center; letter-spacing: 2px; font-weight: bold; }
#mg-area   { position: relative; height: 180px; background: #060e06; border: 1px solid var(--green-dark); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
#mg-result { font-size: 14px; letter-spacing: 3px; text-align: center; display: none; padding: 6px; font-weight: bold; }

/* ===== RESULT SCREENS ===== */
.rscreen        { position: absolute; inset: 0; background: rgba(2,6,2,0.97); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.rscreen.show   { display: flex; }
.rs-title       { font-size: 30px; letter-spacing: 8px; text-align: center; }
.rs-sub         { font-size: 11px; letter-spacing: 3px; color: var(--orange); text-align: center; }
.rs-stats       { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
.rs-stat        { background: var(--green-bg); border: 1px solid var(--green-dark); padding: 10px 20px; border-radius: 4px; text-align: center; }
.rs-stat .sv    { font-size: 22px; color: var(--green); }
.rs-stat .sl    { font-size: 8px; color: var(--green-dim); letter-spacing: 2px; margin-top: 3px; }
.rs-btns        { display: flex; gap: 10px; margin-top: 6px; }
.rs-btn         { background: transparent; border: 1px solid var(--green-dark); color: var(--green); font-family: var(--font); font-size: 12px; padding: 11px 0; cursor: pointer; letter-spacing: 3px; width: 180px; text-align: center; transition: all 0.2s; }
.rs-btn:hover   { border-color: var(--green); background: rgba(57,255,20,0.05); }
.rs-btn.primary { border-color: var(--green); }
#go-cod         { font-size: 10px; color: var(--red); letter-spacing: 2px; text-align: center; background: rgba(40,0,0,0.7); border: 1px solid var(--red); padding: 10px 18px; border-radius: 4px; max-width: 460px; line-height: 1.7; margin: 4px 0; }

/* ===== SCREEN SHAKE ===== */
@keyframes shake { 0%{transform:translate(0,0)} 10%{transform:translate(-4px,2px)} 20%{transform:translate(4px,-2px)} 30%{transform:translate(-3px,3px)} 40%{transform:translate(3px,-1px)} 50%{transform:translate(-2px,2px)} 60%{transform:translate(2px,-2px)} 70%{transform:translate(-1px,1px)} 80%{transform:translate(1px,-1px)} 90%{transform:translate(-1px,0)} 100%{transform:translate(0,0)} }
#G.shake { animation: shake 0.45s ease-out; }

/* ===== VIGNETTE ===== */
#vignette { position: absolute; inset: 0; pointer-events: none; z-index: 998; opacity: 0; transition: opacity 0.15s; background: radial-gradient(ellipse at center, transparent 45%, rgba(255,30,30,0.55) 100%); }
#vignette.flash    { opacity: 1; }
#vignette.critical { opacity: 0.45; animation: vig-pulse 1.2s infinite; }
@keyframes vig-pulse { 0%,100%{opacity:0.25} 50%{opacity:0.55} }

/* ===== MINIGAME-SPECIFIC STYLES ===== */
.ct-cell { width: 36px; height: 36px; background: #060e06; border: 1px solid #1a3d1a; border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #2a5a2a; transition: all 0.12s; user-select: none; }
.ct-cell.active { background: #0a2a0a; border-color: var(--green); color: var(--green); }
.ct-cell.start  { border-color: var(--blue);   color: var(--blue);   background: #001a2a; }
.ct-cell.end    { border-color: var(--yellow);  color: var(--yellow); background: #1a1000; }

.pv-valve        { width: 44px; height: 44px; background: #060e06; border: 2px solid #1a3d1a; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #2a5a2a; transition: all 0.15s; letter-spacing: 1px; }
.pv-valve.open   { background: #0a2a0a; border-color: var(--green); color: var(--green); box-shadow: 0 0 6px rgba(57,255,20,0.3); }
.pv-valve.closed { background: #1a0000; border-color: var(--red);   color: var(--red); }

.mc-btn { background: #060e06; border: 2px solid var(--green-dark); color: var(--green); font-family: var(--font); font-size: 11px; padding: 8px 14px; cursor: pointer; border-radius: 3px; letter-spacing: 1px; }
.mc-btn:active { background: var(--green-dark); border-color: var(--green); }

.dc-row  { display: flex; gap: 2px; font-family: var(--font); font-size: 10px; line-height: 1.6; }
.dc-byte { padding: 1px 3px; border-radius: 2px; cursor: pointer; transition: background 0.1s; }
.dc-byte:hover    { background: #1a3d1a; }
.dc-byte.corrupt  { color: var(--orange); }
.dc-byte.fixed    { color: var(--green); background: #0a1a0a; cursor: default; }
</style>
</head>
<body>
<div id="G">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- GAME OVER SCREEN -->
  <div class="rscreen" id="sc-go">
    <div class="rs-title" style="color:var(--red);text-shadow:0 0 20px rgba(255,50,50,0.4)">FAILURE</div>
    <div class="rs-sub" id="go-reason"></div>
    <div id="go-cod"></div>
    <div class="rs-stats" id="go-stats"></div>
    <div class="rs-btns">
      <button class="rs-btn primary" onclick="startGame()">RESTART</button>
    </div>
  </div>

  <!-- WIN SCREEN -->
  <div class="rscreen" id="sc-win">
    <div class="rs-title" style="color:var(--green);text-shadow:0 0 30px rgba(57,255,20,0.5)">MISSION COMPLETE</div>
    <div class="rs-sub" style="color:var(--green-dim)">ALL 10 WAVES SURVIVED</div>
    <div class="rs-stats" id="win-stats"></div>
    <div class="rs-btns">
      <button class="rs-btn primary" onclick="startGame()">PLAY AGAIN</button>
    </div>
  </div>

  <!-- VIGNETTE FLASH -->
  <div id="vignette"></div>

  <!-- MINIGAME OVERLAY -->
  <div id="overlay">
    <div id="mg-wrap">
      <div id="mg-header">
        <div id="mg-title"></div>
        <button id="mg-back" onclick="closeMG()">ABANDON</button>
      </div>
      <div id="mg-sub"></div>
      <div id="mg-timer"></div>
      <div id="mg-area"></div>
      <div id="mg-result"></div>
    </div>
  </div>

  <!-- HEADER -->
  <div id="hdr">
    <div class="ht">BUNKER-7</div>
    <div class="hstats">
      <div class="stat-block"><div class="stat-val" id="hd">DAY 0</div><div class="stat-lbl">DAY</div></div>
      <div class="stat-block"><div class="stat-val" id="hs2">5<span style="font-size:10px;color:var(--green-dim)">/5</span></div><div class="stat-lbl">ALIVE</div></div>
      <div class="stat-block"><div class="stat-val" id="hw">WAVE 1/10</div><div class="stat-lbl">WAVE</div></div>
      <div class="stat-block"><div class="stat-val" id="hsc" style="color:var(--yellow)">0 PTS</div><div class="stat-lbl">SCORE</div></div>
    </div>
  </div>

  <!-- GAME BODY -->
  <div id="body">
    <div id="left">
      <div>
        <div class="slbl">RESIDENTS - click blue glow for emergency</div>
        <div id="res-grid"></div>
      </div>
      <div>
        <div class="slbl">SYSTEMS - RAD must stay LOW, others HIGH</div>
        <div id="sys-grid"></div>
      </div>
      <div style="flex:1;min-height:0;display:flex;flex-direction:column">
        <div class="slbl">ACTIVITY LOG</div>
        <div id="log"></div>
      </div>
      <div id="radio-wrap">
        <div class="slbl">RADIO CHATTER <span style="font-size:7px;color:#1a4a1a">[PRESS 1/2/3 FOR FIRST CRISIS]</span></div>
        <div id="radio"><div id="radio-inner"></div></div>
      </div>
    </div>
    <div id="right">
      <div class="slbl">ACTIVE CRISES</div>
      <div id="paused-note">MINIGAME ACTIVE - CRISES PAUSED</div>
      <div id="qlist"></div>
      <div id="nq">ALL CLEAR</div>
    </div>
  </div>
</div>

<script>
// ===================================================================
// CONSTANTS
// ===================================================================

const WAVES     = 10;
const WAVE_DUR  = 40;  // seconds per wave

// Resident definitions (name, role, minigame type)
const RES_TEMPLATE = [
  { n: 'DR. CHEN', r: 'Medic',    mg: 'heartrate' },
  { n: 'MALIK',    r: 'Engineer', mg: 'wires'      },
  { n: 'SARA',     r: 'Botanist', mg: 'sequence'   },
  { n: 'BLAKE',    r: 'Security', mg: 'reflex'      },
  { n: 'YUKI',     r: 'Analyst',  mg: 'decrypt'    },
];

// System definitions (name, starting value, passive drain per tick)
const SYS_TEMPLATE = {
  O2:     { n: 'OXYGEN',    v: 100, d: 0.22 },
  FOOD:   { n: 'FOOD',      v: 100, d: 0.14 },
  PWR:    { n: 'POWER',     v: 100, d: 0.12 },
  H2O:    { n: 'WATER',     v: 100, d: 0.18 },
  RAD:    { n: 'RADIATION', v: 0,   d: -0.1  }, // RAD rises instead of falling
  MORALE: { n: 'MORALE',    v: 100, d: 0.10  },
};

// Crisis templates: each has title, affected system, description,
// 3 options (one correct), and damage values for fail/timeout.
const CRISIS_POOL = [
  // OXYGEN
  { t: 'O2 PIPE BURST',     s: 'O2',     desc: 'Oxygen venting in sector 3. Act fast.',              opts: [{l:'SEAL CLAMP',fix:true},{l:'VENT MORE',fix:false},{l:'PATCH FOAM',fix:false}],    dmgS: 28, dmgR: 16 },
  { t: 'FIRE SECTOR 2',     s: 'O2',     desc: 'Uncontrolled combustion depleting air.',             opts: [{l:'CO2 SUPPRES',fix:true},{l:'OPEN DOOR',fix:false},{l:'WATER DUMP',fix:false}],   dmgS: 32, dmgR: 18 },
  { t: 'GAS POCKET',        s: 'O2',     desc: 'Methane pockets near vents.',                        opts: [{l:'IGNITE SAFE',fix:false},{l:'PURGE PUMP',fix:true},{l:'SEAL VENTS',fix:false}],  dmgS: 24, dmgR: 14 },
  { t: 'SCRUBBER FAIL',     s: 'O2',     desc: 'CO2 scrubber offline. Air quality dropping.',        opts: [{l:'BYPASS FAN',fix:false},{l:'SWAP FILTER',fix:true},{l:'OPEN SHAFT',fix:false}],  dmgS: 26, dmgR: 12 },
  { t: 'VENT COLLAPSE',     s: 'O2',     desc: 'Primary ventilation duct crushed by debris.',        opts: [{l:'REROUTE DUCT',fix:true},{l:'SEAL SECTOR',fix:false},{l:'INCREASE FAN',fix:false}],dmgS: 22, dmgR: 14 },
  { t: 'SMOKE BUILDUP',     s: 'O2',     desc: 'Dense smoke from electrical fire filling corridors.',opts: [{l:'HALON FLOOD',fix:true},{l:'OPEN VENTS',fix:false},{l:'FAN REVERSE',fix:false}],  dmgS: 20, dmgR: 10 },
  // FOOD
  { t: 'FOOD ROT',          s: 'FOOD',   desc: 'Contamination spreading in stores.',                 opts: [{l:'INCINERATE',fix:true},{l:'SPREAD OUT',fix:false},{l:'IGNORE',fix:false}],       dmgS: 24, dmgR: 10 },
  { t: 'FUNGAL OUTBREAK',   s: 'FOOD',   desc: 'Spores eating through rations.',                     opts: [{l:'QUARANTINE',fix:false},{l:'UV PULSE',fix:true},{l:'REPLANT',fix:false}],        dmgS: 20, dmgR: 8  },
  { t: 'VERMIN',            s: 'FOOD',   desc: 'Unknown creature consuming rations.',                opts: [{l:'SONIC PULSE',fix:true},{l:'OPEN HATCH',fix:false},{l:'BAIT TRAP',fix:false}],   dmgS: 16, dmgR: 6  },
  { t: 'CROP BLIGHT',       s: 'FOOD',   desc: 'Hydroponics bay infected with blight.',              opts: [{l:'CULL PLANTS',fix:true},{l:'ADD WATER',fix:false},{l:'BOOST LIGHT',fix:false}],  dmgS: 22, dmgR: 8  },
  { t: 'FREEZER FAIL',      s: 'FOOD',   desc: 'Cold storage temperature rising fast.',              opts: [{l:'BYPASS COMP',fix:false},{l:'REROUTE COOL',fix:true},{l:'MOVE STORES',fix:false}],dmgS: 22, dmgR: 8  },
  // POWER
  { t: 'POWER SURGE',       s: 'PWR',    desc: 'Grid overload, life support at risk.',               opts: [{l:'DIVERT CELL',fix:false},{l:'SHUT BREAKER',fix:true},{l:'LOAD BAL.',fix:false}],  dmgS: 26, dmgR: 12 },
  { t: 'COOLANT BREACH',    s: 'PWR',    desc: 'Reactor temp climbing fast.',                        opts: [{l:'VENT STEAM',fix:false},{l:'INJECT COOL',fix:true},{l:'SHUTDOWN',fix:false}],    dmgS: 24, dmgR: 10 },

// Radio chatter lines, keyed by situation
const RADIO_LINES = {
  ok:        ['Signal clear. Proceeding.','Copy that. Executing now.','Roger. On it.','Confirmed.'],
  crisis:    ['Alert level rising.','Something is wrong down here.','Pressure dropping fast.'],
  critical:  ['Mayday. Mayday. All hands.','Systems failing. Need override NOW.','Emergency protocol!'],
  low_o2:    ['Air tastes wrong. O2 levels off.','Getting dizzy.','Scrubbers better kick in soon.'],
  low_food:  ['Rations running short.','We might need to start rationing.'],
  low_pwr:   ['Lights flickered in sector 2.','Keep non-essentials off. Power is thin.'],
  high_rad:  ['Geiger is singing. Stay out of the lower deck.','Dosimeter is not happy.'],
  low_h2o:   ['Water pressure dropped.','Taps ran dry in sector 1.'],
  low_morale:['People are scared.','Morale is on the floor, boss.'],
  idle:      ['Bunker-7 holding. For now.','Exterior is quiet. Too quiet.','All sectors nominal... mostly.',
               'No signals from topside. As expected.','Perimeter secure. Barely.'],
  death:     ['One of us is gone. Moment of silence.','Casualty confirmed. We go on.'],
};

// ASCII portraits
const PORTRAITS = {
  healthy:  ['(^_^)','(-_-)','(o_o)','(._.)','(*_*)'],
  hurt:     ['(>_<)','(@_@)','(x_x)','(T_T)','(o_O)'],
  critical: ['(X_X)','(;_;)','(>.<)','(-.-) ','(x_x)'],
  dead:     ['(+_+)','(x_x)','(T_T)','(R.I.P)','(###)'],
};

// ===================================================================
// STATE
// ===================================================================

let RES, SYS;
let crises = [], nextCrisisId = 0;
let logs = [], radioLines = [];
let score = 0, wave = 1, sec = 0;
let running = false, mgActive = false;
let gameTimer = null, mgTimer = null;
let lastLethalEvent = '';
let vigTimeout = null;

// ===================================================================
// UTILITIES
// ===================================================================

// Color for a system bar (higher = greener for normal systems, inverted for RAD)
function barColor(v) {
  return v > 55 ? '#39ff14' : v > 25 ? '#ffb300' : '#ff3232';
}

// Pick a random item from an array
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// Shuffle array in place, return new array
function shuffled(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

// ===================================================================
// VISUAL EFFECTS
// ===================================================================

function triggerShake() {
  const G = document.getElementById('G');
  G.classList.remove('shake');
  void G.offsetWidth; // force reflow to restart animation
  G.classList.add('shake');
  setTimeout(() => G.classList.remove('shake'), 500);
}

function flashVignette(persist) {
  const v = document.getElementById('vignette');
  v.classList.add('flash');
  if (persist) { v.classList.add('critical'); return; }
  if (vigTimeout) clearTimeout(vigTimeout);
  vigTimeout = setTimeout(() => v.classList.remove('flash'), 600);
}

// Keep vignette pulsing when any system is in a critical state
function updateCriticalVignette() {
  const v = document.getElementById('vignette');
  const hasCritical =
    SYS.RAD.v >= 70 ||
    Object.entries(SYS).some(([k, s]) => k !== 'RAD' && s.v <= 15) ||
    RES.some(r => r.alive && r.hp < 25);
  v.classList.toggle('critical', hasCritical);
  v.classList.toggle('flash', hasCritical);
}

function flashResident(idx) {
  const cards = document.querySelectorAll('.res');
  if (!cards[idx]) return;
  cards[idx].classList.remove('flash-hurt');
  void cards[idx].offsetWidth;
  cards[idx].classList.add('flash-hurt');
  setTimeout(() => cards[idx].classList.remove('flash-hurt'), 450);
}

// ===================================================================
// LOGGING & RADIO
// ===================================================================

function addLog(msg, type = '') {
  logs.unshift({ msg, type });
  if (logs.length > 40) logs.pop();
  renderLog();
}

function addRadioLine(category) {
  const pool = RADIO_LINES[category] || RADIO_LINES.idle;
  const text = pick(pool);
  radioLines.unshift({ text, fresh: true });
  if (radioLines.length > 5) radioLines.pop();
  renderRadio();
  setTimeout(() => {
    const line = radioLines.find(l => l.text === text && l.fresh);
    if (line) line.fresh = false;
    renderRadio();
  }, 2000);
}

// Choose radio category based on current game state
function pickRadioCategory() {
  if (!SYS) return 'idle';
  if (SYS.RAD.v > 65)     return 'high_rad';
  if (SYS.O2.v < 20)      return 'low_o2';
  if (SYS.PWR.v < 20)     return 'low_pwr';
  if (SYS.H2O.v < 20)     return 'low_h2o';
  if (SYS.FOOD.v < 20)    return 'low_food';
  if (SYS.MORALE.v < 20)  return 'low_morale';
  if (crises.length > 2)  return 'crisis';
  return 'idle';
}

// ===================================================================
// RENDERING
// ===================================================================

function renderLog() {
  document.getElementById('log').innerHTML =
    logs.slice(0, 10).map(l => `<div class="ll ${l.type}">&gt; ${l.msg}</div>`).join('');
}

function renderRadio() {
  const inner = document.getElementById('radio-inner');
  if (!inner) return;
  inner.innerHTML = [...radioLines].reverse()
    .map(l => `<div class="rl${l.fresh ? ' new' : ''}"">// ${l.text}</div>`)
    .join('');
}

function renderResidents() {
  document.getElementById('res-grid').innerHTML = RES.map((r, i) => {
    const cls = !r.alive ? 'dead' : r.personal ? 'mgon' : r.hp < 35 ? 'alert' : '';
    const badge = !r.alive ? 'x' : r.personal ? '?' : r.hp < 35 ? '!' : 'o';
    const badgeColor = r.personal ? 'var(--blue)' : r.hp < 35 ? 'var(--orange)' : 'var(--green)';

    let portrait, portraitColor;
    if (!r.alive)        { portrait = PORTRAITS.dead[i];     portraitColor = '#333'; }
    else if (r.hp > 65)  { portrait = PORTRAITS.healthy[i];  portraitColor = '#39ff14'; }
    else if (r.hp > 35)  { portrait = PORTRAITS.hurt[i];     portraitColor = '#ffb300'; }
    else                 { portrait = PORTRAITS.critical[i];  portraitColor = '#ff3232'; }

    // Short name: "DR. CHEN" -> "DR. CHEN", others show first word only
    const shortName = r.n.startsWith('DR.') ? r.n.split(' ').slice(0, 2).join(' ') : r.n.split(' ')[0];

    // Show countdown if a personal crisis is pending
    let statusText = r.alive ? r.st : '[deceased]';
    if (r.alive && r.personal && r._deadline) {
      const left = Math.max(0, Math.ceil((r._deadline - Date.now()) / 1000));
      statusText = 'HELP NOW - ' + left + 's';
    }

    return `<div class="res ${cls}" onclick="clickResident(${i})">
      <div class="res-face" style="color:${portraitColor}">${portrait}</div>
      <div class="rn">${shortName}<span style="color:${badgeColor}">${badge}</span></div>
      <div class="rr">${r.r}</div>
      <div class="rhb"><div class="rhf" style="width:${Math.max(0, r.hp)}%;background:${r.alive ? barColor(r.hp) : '#222'}"></div></div>
      <div class="rst">${statusText}</div>
    </div>`;
  }).join('');
}

function renderSystems() {
  document.getElementById('sys-grid').innerHTML = Object.entries(SYS).map(([k, s]) => {
    const isRad = k === 'RAD';
    const color = isRad ? (s.v < 30 ? '#39ff14' : s.v < 60 ? '#ffb300' : '#ff3232') : barColor(s.v);
    const width = Math.min(100, Math.max(0, s.v));
    return `<div class="sr">
      <div class="sn">${s.n}</div>
      <div class="sb"><div class="sf" style="width:${width}%;background:${color}"></div></div>
      <div class="sv" style="color:${color}">${Math.round(s.v)}%</div>
    </div>`;
  }).join('');
}

function renderCrises() {
  const listEl   = document.getElementById('qlist');
  const noneEl   = document.getElementById('nq');
  const pauseEl  = document.getElementById('paused-note');

  pauseEl.style.display = mgActive ? 'block' : 'none';

  if (!crises.length) {
    listEl.innerHTML = '';
    noneEl.style.display = 'block';
    return;
  }
  noneEl.style.display = 'none';

  listEl.innerHTML = crises.slice(0, 5).map((q, qi) => {
    const pct = q.tl / q.tt;
    const col = pct > 0.5 ? '#39ff14' : pct > 0.25 ? '#ffb300' : '#ff3232';
    const cls = pct < 0.25 ? 'urg' : pct < 0.5 ? 'warn' : '';
    const isFirst = qi === 0;
    return `<div class="q ${cls}">
      <div class="qh">
        <div class="qt">${q.t}</div>
        <div class="qtm" style="color:${col}">${Math.ceil(q.tl)}s</div>
      </div>
      <div class="qd">${q.desc}</div>
      <div class="qpb"><div class="qpf" style="width:${pct * 100}%;background:${col}"></div></div>
      <div class="qa">${q.shuffledOpts.map((o, oi) =>
        `<button class="qb" onclick="answerCrisis(${q.id},'${o.l}',${o.fix})">
           ${isFirst ? `<span style="color:#1a4a1a;font-size:8px">[${oi + 1}] </span>` : ''}${o.l}
         </button>`
      ).join('')}</div>
    </div>`;
  }).join('');
}

function renderHeader() {
  document.getElementById('hd').textContent  = 'DAY ' + Math.floor(sec / 60);
  document.getElementById('hs2').innerHTML   = `${RES.filter(r => r.alive).length}<span style="font-size:10px;color:var(--green-dim)">/5</span>`;
  document.getElementById('hw').textContent  = 'WAVE ' + wave + '/' + WAVES;
  document.getElementById('hsc').textContent = score + ' PTS';
}

function renderAll() {
  renderResidents();
  renderSystems();
  renderCrises();
  renderHeader();
}

// ===================================================================
// GAME OVER / WIN
// ===================================================================

function statCell(label, val, color) {
  return `<div class="rs-stat"><div class="sv" style="color:${color || 'var(--green)'}">${val}</div><div class="sl">${label}</div></div>`;
}

function showScreen(id) {
  document.querySelectorAll('.rscreen').forEach(s => s.classList.remove('show'));
  if (id) document.getElementById(id).classList.add('show');
}

function gameOver(reason) {
  running = false;
  clearInterval(gameTimer);
  triggerShake();
  flashVignette(true);
  document.getElementById('go-reason').textContent = reason.toUpperCase();
  document.getElementById('go-cod').textContent =
    'CAUSE: ' + (lastLethalEvent || reason.toUpperCase() + ' ON WAVE ' + wave);
  document.getElementById('go-stats').innerHTML =
    statCell('DAYS', Math.floor(sec / 60)) +
    statCell('SCORE', score, 'var(--yellow)') +
    statCell('WAVE REACHED', 'WAVE ' + wave) +
    statCell('SURVIVORS', RES.filter(r => r.alive).length + '/5');
  showScreen('sc-go');
}

function winGame() {
  running = false;
  clearInterval(gameTimer);
  document.getElementById('win-stats').innerHTML =
    statCell('DAYS', Math.floor(sec / 60)) +
    statCell('SCORE', score, 'var(--yellow)') +
    statCell('WAVES', WAVES + ' / ' + WAVES) +
    statCell('SURVIVORS', RES.filter(r => r.alive).length + '/5');
  showScreen('sc-win');
}

// ===================================================================
// RESIDENTS
// ===================================================================

function killResident(r) {
  r.alive = false;
  r.hp = 0;
  r.st = 'Deceased';
  r.personal = false;
  lastLethalEvent = r.n + ' DIED ON WAVE ' + wave;
  addLog('FATAL: ' + r.n + ' has died', 'c');
  addRadioLine('death');
  triggerShake();
  flashVignette(false);
  renderResidents();
  if (!RES.some(r => r.alive)) gameOver('All residents perished');
}

function clickResident(i) {
  const r = RES[i];
  if (!r.alive || !r.personal) return;
  r.personal = false;
  openMinigame(r);
}

// ===================================================================
// CRISIS SYSTEM
// ===================================================================

function spawnCrisis() {
  if (!running) return;
  const tpl = pick(CRISIS_POOL);
  const timeLimit = Math.max(8, 26 - wave * 2);
  crises.push({
    id:           nextCrisisId++,
    t:            tpl.t,
    s:            tpl.s,
    desc:         tpl.desc,
    shuffledOpts: shuffled(tpl.opts),
    dmgS:         tpl.dmgS,
    dmgR:         tpl.dmgR,
    tl:           timeLimit,
    tt:           timeLimit,
  });
  addLog('CRISIS: ' + tpl.t, 'w');
  addRadioLine('crisis');
  renderCrises();
}

function damageSystem(key, amount) {
  const s = SYS[key];
  if (!s) return;
  if (key === 'RAD') s.v = Math.min(100, s.v + amount);
  else               s.v = Math.max(0, s.v - amount);
}

function healSystem(key, amount) {
  const s = SYS[key];
  if (!s) return;
  if (key === 'RAD') s.v = Math.max(0, s.v - amount);
  else               s.v = Math.min(100, s.v + amount);
}

function answerCrisis(id, label, fix) {
  const idx = crises.findIndex(q => q.id === id);
  if (idx < 0) return;
  const q = crises.splice(idx, 1)[0];

  if (fix) {
    // Correct answer
    healSystem(q.s, 20);
    score += Math.round(40 * wave * (q.tl / q.tt));
    addLog('[OK] ' + q.t + ' resolved', 'g');
    addRadioLine('ok');
  } else {
    // Wrong answer
    damageSystem(q.s, q.dmgS * 0.6);
    const alive = RES.filter(r => r.alive);
    if (alive.length) {
      const r = pick(alive);
      r.hp = Math.max(0, r.hp - q.dmgR * 0.5);
      r.st = 'Hurt by ' + label.toLowerCase();
      flashResident(RES.indexOf(r));
      if (r.hp <= 0 && r.alive) killResident(r);
    }
    addLog('[FAIL] Wrong call: ' + label, 'c');
    addRadioLine('crisis');
    renderResidents();
  }
  renderSystems(); renderCrises(); renderHeader();
}

// Called when a crisis timer expires
function expireCrisis(q) {
  damageSystem(q.s, q.dmgS);
  const alive = RES.filter(r => r.alive);
  if (alive.length) {
    const r = pick(alive);
    r.hp = Math.max(0, r.hp - q.dmgR);
    r.st = 'Hurt by ' + q.t.toLowerCase();
    flashResident(RES.indexOf(r));
    if (r.hp <= 0 && r.alive) {
      lastLethalEvent = SYS[q.s].n + ' COLLAPSED ON WAVE ' + wave + ' - ' + q.t + ' UNANSWERED';
      killResident(r);
    }
  }
  const isBad = q.s === 'RAD' ? SYS.RAD.v >= 70 : SYS[q.s].v <= 15;
  if (isBad) { triggerShake(); flashVignette(false); addRadioLine('critical'); }
  else addRadioLine('crisis');
  addLog('[TIMEOUT] ' + q.t + ' expired!', 'c');
  renderResidents(); renderSystems(); renderCrises(); renderHeader();
}

// Keyboard shortcut: keys 1-3 answer the first crisis
document.addEventListener('keydown', e => {
  if (!running || mgActive) return;
  const n = parseInt(e.key);
  if (n >= 1 && n <= 3 && crises.length) {
    const opt = crises[0].shuffledOpts[n - 1];
    if (opt) answerCrisis(crises[0].id, opt.l, opt.fix);
  }
});

// ===================================================================
// MAIN GAME TICK (once per second)
// ===================================================================

function tick() {
  if (!running) return;
  sec++;

  // Advance wave
  wave = Math.min(WAVES, 1 + Math.floor(sec / WAVE_DUR));

  // Passive system decay (scales with wave)
  const decay = 1 + wave * 0.35;
  Object.entries(SYS).forEach(([k, s]) => {
    if (k === 'RAD') s.v = Math.max(0, s.v + s.d * decay);
    else             s.v = Math.max(0, s.v - s.d * decay);
  });

  // Radiation slowly damages residents when high
  if (SYS.RAD.v > 60) {
    RES.filter(r => r.alive).forEach(r => {
      r.hp = Math.max(0, r.hp - 0.5);
      if (r.hp <= 0 && r.alive) killResident(r);
    });
  }

  // Critical systems damage residents directly
  Object.entries(SYS).forEach(([k, s]) => {
    if (k !== 'RAD' && s.v < 15) {
      RES.filter(r => r.alive).forEach(r => {
        r.hp = Math.max(0, r.hp - 1.0);
        if (r.hp <= 0 && r.alive) {
          lastLethalEvent = SYS[k].n + ' DEPLETED ON WAVE ' + wave;
          killResident(r);
        }
      });
    }
  });

  // Tick crisis timers (paused during minigames)
  if (!mgActive) {
    crises.forEach(q => { q.tl = Math.max(0, q.tl - 1); });
    crises.filter(q => q.tl <= 0).forEach(q => expireCrisis(q));
    crises = crises.filter(q => q.tl > 0);
  }

  // Occasional ambient log message
  if (sec % 30 === 0) {
    addLog(pick(['Geothermal stable', 'Ext temp: -14C', 'No surface signals', 'Structural integrity OK', 'Air scrubbers nominal']));
  }

  // Occasional radio chatter
  if (sec % 14 === 0) addRadioLine(pickRadioCategory());

  updateCriticalVignette();

  // Check win condition
  if (wave >= WAVES && sec > WAVES * WAVE_DUR) { winGame(); return; }

  renderAll();
}

// Schedule the next crisis spawn with random delay, scaling with wave
function scheduleNextCrisis() {
  if (!running) return;
  const minDelay = Math.max(2000, 8000 - wave * 700);
  const maxDelay = Math.max(4000, 16000 - wave * 1000);
  setTimeout(() => {
    if (!running) return;
    spawnCrisis();
    // Chance to spawn extra crises in quick succession on later waves
    if (Math.random() < 0.3 + wave * 0.08) setTimeout(spawnCrisis, 1200);
    scheduleNextCrisis();
  }, minDelay + Math.random() * (maxDelay - minDelay));
}

// Schedule personal crisis events (residents that need minigame help)
function schedulePersonalCrisis() {
  if (!running) return;
  setTimeout(() => {
    if (!running) return;
    const available = RES.filter(r => r.alive && !r.personal);
    if (available.length) {
      const r = pick(available);
      r.personal = true;
      r.st = 'NEEDS ATTENTION';
      r._deadline = Date.now() + 20000; // 20 second window
      addLog('PERSONAL: ' + r.n + ' needs help (click them)', 'w');
      addRadioLine('crisis');

      // Background countdown: if ignored, apply penalty
      const countdown = () => {
        if (!r.personal || !r.alive) return; // already handled
        const left = r._deadline - Date.now();
        if (left <= 0) {
          personalCrisisFail(r, 'Ignored - health deteriorated');
          return;
        }
        setTimeout(countdown, 500);
      };
      setTimeout(countdown, 500);
      renderResidents();
    }
    schedulePersonalCrisis();
  }, 14000 + Math.random() * 18000);
}

// ===================================================================
// MINIGAME SYSTEM
// ===================================================================

function openMinigame(r) {
  mgActive = true;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('mg-title').textContent  = r.n + ' - PERSONAL CRISIS';
  document.getElementById('mg-result').style.display = 'none';
  document.getElementById('mg-sub').textContent    = '';
  document.getElementById('mg-timer').textContent  = '';
  const area = document.getElementById('mg-area');
  area.innerHTML = '';
  area.style.pointerEvents = 'auto';
  document.getElementById('mg-back').style.pointerEvents = 'auto';
  renderCrises();

  // Launch the appropriate minigame
  if      (r.mg === 'heartrate') buildMG_heartrate(r, area);
  else if (r.mg === 'wires')     buildMG_wires(r, area);
  else if (r.mg === 'sequence')  buildMG_sequence(r, area);
  else if (r.mg === 'reflex')    buildMG_reflex(r, area);
  else if (r.mg === 'decrypt')   buildMG_decrypt(r, area);
}

function personalCrisisSuccess(r) {
  clearTimeout(mgTimer);
  r.hp = Math.min(100, r.hp + 25);
  r.st = 'Recovered';
  score += 80 * wave;
  const result = document.getElementById('mg-result');
  result.style.display = 'block';
  result.style.color = '#39ff14';
  result.textContent = 'STABILIZED +25 HP';
  document.getElementById('mg-timer').textContent = '';
  document.getElementById('mg-area').style.pointerEvents = 'none';
  document.getElementById('mg-back').style.pointerEvents = 'none';
  addLog('[MG OK] ' + r.n + ' stabilized', 'g');
  renderResidents();
  renderHeader();
  setTimeout(closeMinigameOverlay, 1400);
}

function personalCrisisFail(r, msg) {
  clearTimeout(mgTimer);
  r.personal = false;
  r.hp = Math.max(0, r.hp - 30);
  r.st = msg || 'Deteriorated';
  if (r.hp <= 0 && r.alive) killResident(r);
  addLog('[MG FAIL] ' + r.n + ' deteriorated', 'c');
  renderResidents();
  renderHeader();

  if (mgActive) {
    // Overlay is open: show red result then close
    const result = document.getElementById('mg-result');
    result.style.display = 'block';
    result.style.color = '#ff3232';
    result.textContent = 'FAILED -30 HP';
    document.getElementById('mg-timer').textContent = '';
    document.getElementById('mg-area').style.pointerEvents = 'none';
    document.getElementById('mg-back').style.pointerEvents = 'none';
    document.getElementById('mg-wrap').style.borderColor = '#ff3232';
    setTimeout(() => {
      document.getElementById('mg-wrap').style.borderColor = '';
      closeMinigameOverlay();
    }, 1400);
  }
}

function closeMinigameOverlay() {
  document.getElementById('overlay').classList.remove('show');
  mgActive = false;
  renderCrises();
}

function closeMG() {
  clearTimeout(mgTimer);
  closeMinigameOverlay();
}

// Show the countdown timer inside an open minigame
function startMGTimer(r, failMsg) {
  const tick = () => {
    if (!r.alive || (!r.personal && !mgActive)) return;
    const el = document.getElementById('mg-timer');
    const left = Math.max(0, Math.ceil((r._deadline - Date.now()) / 1000));
    if (el) el.textContent = left + 's REMAINING';
    if (left <= 0) { personalCrisisFail(r, failMsg); return; }
    mgTimer = setTimeout(tick, 250);
  };
  tick();
}

// ===================================================================
// MINIGAMES
// ===================================================================

// DR. CHEN - HEARTBEAT MONITOR
// Keep the bouncing marker inside the green zone by clicking to slow it. Need 5 hits.
function buildMG_heartrate(r, area) {
  document.getElementById('mg-sub').textContent = 'DR. CHEN - Click when the marker hits the GREEN zone. Need 5 hits.';
  area.innerHTML = `
    <canvas id="hr-c" width="320" height="150" style="display:block;margin:0 auto;cursor:pointer"></canvas>
    <div style="text-align:center;font-size:9px;color:#4a7a4a;margin-top:4px;letter-spacing:1px">CLICK when marker is inside the GREEN zone</div>`;

  const canvas = area.querySelector('#hr-c');
  const ctx = canvas.getContext('2d');
  let x = 0, speed = 2.8 + wave * 0.15, dir = 1;
  let hits = 0, needed = 5;
  const zoneL = 115, zoneR = 195;
  let animId;

  function draw() {
    ctx.clearRect(0, 0, 320, 150);
    ctx.fillStyle = '#060e06'; ctx.fillRect(0, 0, 320, 150);
    // Green zone
    ctx.fillStyle = '#0a2a0a'; ctx.fillRect(zoneL, 0, zoneR - zoneL, 150);
    ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 2; ctx.strokeRect(zoneL, 0, zoneR - zoneL, 150);
    // Progress pips
    for (let i = 0; i < needed; i++) {
      ctx.fillStyle = i < hits ? '#39ff14' : '#1a3d1a';
      ctx.fillRect(8 + i * 14, 8, 10, 10);
    }
    // Marker
    ctx.fillStyle = '#ff3232'; ctx.fillRect(x - 4, 0, 8, 150);
    // Physics
    x += speed * dir;
    if (x >= 318 || x <= 2) dir *= -1;
    animId = requestAnimationFrame(draw);
  }

  canvas.onclick = () => {
    if (x > zoneL && x < zoneR) {
      hits++;
      if (hits >= needed) { cancelAnimationFrame(animId); personalCrisisSuccess(r); }
    } else {
      hits = Math.max(0, hits - 1);
    }
  };

  draw();
  startMGTimer(r, 'Cardiac event');
}

// MALIK - CIRCUIT TRACE
// Click cells to build a connected path from S to E on a 7x4 grid.
function buildMG_wires(r, area) {
  document.getElementById('mg-sub').textContent = 'MALIK - Trace a path from S (blue) to E (yellow). Click cells to toggle.';
  const COLS = 7, ROWS = 4;
  const selected = new Set();

  function isConnected() {
    // BFS from (0,0) to (ROWS-1,COLS-1) through selected + endpoints
    const all = new Set(selected);
    all.add('0,0');
    all.add((ROWS - 1) + ',' + (COLS - 1));
    const visited = new Set(['0,0']);
    const queue = ['0,0'];
    const goal = (ROWS - 1) + ',' + (COLS - 1);
    while (queue.length) {
      const cur = queue.shift();
      if (cur === goal) return true;
      const [cr, cc] = cur.split(',').map(Number);
      [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]].forEach(([nr, nc]) => {
        const key = nr + ',' + nc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited.has(key) && all.has(key)) {
          visited.add(key); queue.push(key);
        }
      });
    }
    return false;
  }

  function render() {
    area.innerHTML = `<div style="padding:8px 6px">
      <div style="display:grid;grid-template-columns:repeat(${COLS},1fr);gap:3px;margin-bottom:6px" id="ct-grid"></div>
      <div style="font-size:9px;color:#4a7a4a;text-align:center;letter-spacing:1px">Click cells to build a path from S to E</div>
    </div>`;
    const grid = area.querySelector('#ct-grid');
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const key = row + ',' + col;
        const isStart = row === 0 && col === 0;
        const isEnd   = row === ROWS - 1 && col === COLS - 1;
        const cls = isStart ? 'ct-cell start' : isEnd ? 'ct-cell end' : selected.has(key) ? 'ct-cell active' : 'ct-cell';
        const label = isStart ? 'S' : isEnd ? 'E' : selected.has(key) ? '+' : '.';
        const cell = document.createElement('div');
        cell.className = cls;
        cell.textContent = label;
        if (!isStart && !isEnd) {
          cell.onclick = () => {
            if (selected.has(key)) selected.delete(key); else selected.add(key);
            if (isConnected()) { personalCrisisSuccess(r); return; }
            render();
          };
        }
        grid.appendChild(cell);
      }
    }
  }

  render();
  startMGTimer(r, 'Circuit overload');
}

// SARA - VALVE SEQUENCE
// Open 5 valves in the correct order shown by the flow hint.
function buildMG_sequence(r, area) {
  document.getElementById('mg-sub').textContent = 'SARA - Open the valves in the correct pressure order. Follow the flow direction shown.';
  const labels  = ['V1', 'V2', 'V3', 'V4', 'V5'];
  const correct = shuffled(labels);
  let step = 0;

  function render() {
    const hintText = correct.slice(0, -1).map((v, i) => v + ' > ' + correct[i + 1]).join('  ');
    area.innerHTML = `<div style="padding:10px">
      <div style="font-size:8px;color:#1a5a1a;letter-spacing:1px;margin-bottom:8px;text-align:center">FLOW: ${hintText}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:8px" id="pv-row"></div>
      <div id="pv-msg" style="font-size:10px;color:#4a7a4a;text-align:center;letter-spacing:1px">Open valve ${step + 1}/${labels.length}: ${correct[step]}</div>
    </div>`;

    const row = area.querySelector('#pv-row');
    labels.forEach(lbl => {
      const opened    = correct.indexOf(lbl) < step;
      const isCurrent = correct[step] === lbl;
      const div = document.createElement('div');
      div.className = 'pv-valve' + (opened ? ' open' : isCurrent ? '' : ' closed');
      div.textContent = lbl;
      if (!opened) {
        div.onclick = () => {
          if (lbl === correct[step]) {
            step++;
            if (step >= labels.length) { personalCrisisSuccess(r); return; }
            render();
          } else {
            div.className = 'pv-valve closed';
            personalCrisisFail(r, 'Wrong valve sequence');
          }
        };
      }
      row.appendChild(div);
    });
  }

  render();
  startMGTimer(r, 'Pressure cascade failure');
}

// BLAKE - WHACK-A-MOLE
// Hit 6 appearing targets before they vanish.
function buildMG_reflex(r, area) {
  document.getElementById('mg-sub').textContent = 'BLAKE - Hit 6 targets before they vanish.';
  let hits = 0, needed = 6;
  area.innerHTML = `
    <div id="rf" style="position:relative;width:100%;height:148px;background:#060e06"></div>
    <div id="rf-s" style="text-align:center;font-size:11px;color:#39ff14;margin-top:4px;letter-spacing:2px">0/${needed} hits</div>`;

  const field = area.querySelector('#rf');

  function spawnTarget() {
    if (!mgActive || hits >= needed) return;
    const sz = 34;
    const btn = document.createElement('button');
    btn.style.cssText = `position:absolute;left:${Math.random() * (280 - sz)}px;top:${Math.random() * (130 - sz)}px;width:${sz}px;height:${sz}px;background:#ff3232;border-radius:50%;cursor:pointer;border:2px solid #ff8888;color:#fff;font-family:monospace;font-size:13px;padding:0;font-weight:bold`;
    btn.textContent = '!';
    btn.onclick = () => {
      if (btn.parentNode) field.removeChild(btn);
      hits++;
      document.getElementById('rf-s').textContent = hits + '/' + needed + ' hits';
      if (hits >= needed) personalCrisisSuccess(r);
    };
    field.appendChild(btn);
    // Target disappears automatically
    setTimeout(() => { if (btn.parentNode) field.removeChild(btn); }, Math.max(500, 1100 - wave * 60));
    setTimeout(spawnTarget, 450 + Math.random() * 350);
  }

  spawnTarget();
  startMGTimer(r, 'Threat not neutralized');
}

// YUKI - CORRUPTED DATA
// Click every orange (corrupted) byte in the hex dump.
function buildMG_decrypt(r, area) {
  document.getElementById('mg-sub').textContent = 'YUKI - Click every ORANGE corrupted byte in the data stream to patch it.';
  const ROWS = 5, COLS = 8;
  const totalCorrupt = 4 + Math.min(wave, 4);

  // Create cells, mark random ones as corrupt
  const corruptSet = new Set();
  while (corruptSet.size < totalCorrupt) corruptSet.add(Math.floor(Math.random() * ROWS * COLS));

  const cells = Array.from({ length: ROWS * COLS }, (_, i) => {
    const isCorrupt = corruptSet.has(i);
    const val = (isCorrupt
      ? Math.floor(Math.random() * 0x80) + 0x80
      : Math.floor(Math.random() * 0x7F)
    ).toString(16).toUpperCase().padStart(2, '0');
    return { val, corrupt: isCorrupt, fixed: false };
  });

  let fixedCount = 0;

  function render() {
    area.innerHTML = `<div style="padding:8px 6px">
      <div id="dc-stream" style="font-family:var(--font)"></div>
      <div style="font-size:9px;color:#4a7a4a;text-align:center;margin-top:4px;letter-spacing:1px">${fixedCount}/${totalCorrupt} patched</div>
    </div>`;
    const stream = area.querySelector('#dc-stream');
    for (let row = 0; row < ROWS; row++) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'dc-row';
      // Offset label
      const off = document.createElement('span');
      off.style.cssText = 'color:#1a3d1a;font-size:9px;width:28px;flex-shrink:0';
      off.textContent = (row * COLS).toString(16).toUpperCase().padStart(4, '0') + ':';
      rowDiv.appendChild(off);
      for (let col = 0; col < COLS; col++) {
        const c = cells[row * COLS + col];
        const span = document.createElement('span');
        span.className = 'dc-byte' + (c.corrupt && !c.fixed ? ' corrupt' : c.fixed ? ' fixed' : '');
        span.textContent = c.val;
        if (c.corrupt && !c.fixed) {
          span.onclick = () => {
            c.fixed = true;
            fixedCount++;
            c.val = Math.floor(Math.random() * 0x7F).toString(16).toUpperCase().padStart(2, '0');
            if (fixedCount >= totalCorrupt) { personalCrisisSuccess(r); return; }
            render();
          };
        }
        rowDiv.appendChild(span);
      }
      stream.appendChild(rowDiv);
    }
  }

  render();
  startMGTimer(r, 'Data stream unrecoverable');
}

// ===================================================================
// GAME INITIALIZATION
// ===================================================================

function startGame() {
  // Reset all state
  RES = RES_TEMPLATE.map(t => ({ ...t, hp: 100, alive: true, st: 'Ready', personal: false }));
  SYS = {};
  Object.entries(SYS_TEMPLATE).forEach(([k, s]) => { SYS[k] = { ...s, v: s.v }; });
  crises = [];
  logs = [];
  radioLines = [];
  score = 0;
  wave = 1;
  sec = 0;
  running = true;
  nextCrisisId = 0;
  lastLethalEvent = '';
  mgActive = false;

  // Clear intervals and overlays
  clearInterval(gameTimer);
  clearTimeout(mgTimer);
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.rscreen').forEach(s => s.classList.remove('show'));
  const v = document.getElementById('vignette');
  v.classList.remove('flash', 'critical');

  // Initial log messages
  addLog('BUNKER-7 ONLINE. 5 residents detected.', 'g');
  addLog('Wave 1 active. Good luck, operator.', 'g');
  addRadioLine('idle');

  renderAll();

  // Start the clock and event schedulers
  gameTimer = setInterval(tick, 1000);
  setTimeout(spawnCrisis, 5000);
  setTimeout(spawnCrisis, 8000);
  scheduleNextCrisis();
  schedulePersonalCrisis();
}

// Start immediately on page load
startGame();
